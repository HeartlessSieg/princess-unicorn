<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess & the Unicorn — Save the Kingdom!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:radial-gradient(ellipse at top,#1a0535 0%,#0a0118 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;font-family:'Nunito',sans-serif;color:#fff;overflow:hidden;
}
#hud{
  width:min(960px,100vw);display:flex;justify-content:space-between;align-items:center;
  padding:5px 12px;background:rgba(10,1,30,0.95);
  border:2px solid #8b2be2;border-bottom:none;box-sizing:border-box;flex-wrap:wrap;gap:3px;
}
.hgroup{display:flex;align-items:center;gap:6px;}
.hlabel{font-size:9px;letter-spacing:2px;color:#c084fc;text-transform:uppercase;font-family:'Cinzel',serif;}
.hval{font-size:12px;font-weight:800;color:#fff;}
.bar-wrap{width:70px;height:7px;background:rgba(255,255,255,0.12);border-radius:4px;overflow:hidden;}
.bar-inner{height:100%;border-radius:4px;transition:width 0.2s;}
.hearts{font-size:13px;letter-spacing:-1px;}
#wrapper{
  position:relative;width:min(960px,100vw);aspect-ratio:960/520;
  border:2px solid #8b2be2;box-shadow:0 0 50px #8b2be255;overflow:hidden;
}
canvas{display:block;width:100%;height:100%;image-rendering:auto;}
#overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(40,5,80,0.97) 0%,rgba(5,0,20,0.98) 100%);
  padding:14px;overflow-y:auto;
}
.ov-title{
  font-family:'Cinzel',serif;font-size:clamp(14px,3vw,30px);font-weight:900;
  background:linear-gradient(135deg,#f0abfc,#818cf8,#f0abfc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;line-height:1.2;margin-bottom:3px;
  filter:drop-shadow(0 0 20px #c084fc88);
}
.ov-sub{font-size:clamp(7px,1.1vw,11px);color:#a78bfa;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;text-align:center;}
.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:520px;width:100%;margin-bottom:12px;}
.ctrl-box{background:rgba(139,43,226,0.1);border:1px solid rgba(139,43,226,0.35);border-radius:12px;padding:8px 12px;}
.ctrl-head{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:#c084fc;text-transform:uppercase;margin-bottom:5px;}
.ctrl-row{font-size:9px;color:#ddd6fe;line-height:1.85;}
.ctrl-key{display:inline-block;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:1px 4px;font-size:8px;font-family:monospace;color:#fff;margin:0 1px;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.gBtn{padding:9px 22px;border:2px solid #8b2be2;border-radius:30px;background:rgba(139,43,226,0.18);color:#e9d5ff;font-family:'Cinzel',serif;font-size:clamp(9px,1.3vw,13px);cursor:pointer;transition:all 0.2s;letter-spacing:1px;}
.gBtn:hover{background:rgba(139,43,226,0.5);box-shadow:0 0 20px #8b2be2;}
.gBtn.p2{border-color:#f97316;color:#fed7aa;}
.gBtn.p2:hover{background:rgba(249,115,22,0.4);}
.level-banner{font-family:'Cinzel',serif;font-size:clamp(18px,3.5vw,38px);color:#fde68a;text-shadow:0 0 30px #f59e0b;text-align:center;margin-bottom:4px;font-weight:700;}
.level-name{font-size:clamp(10px,1.8vw,18px);color:#c084fc;margin-bottom:4px;text-align:center;}
.level-tip{font-size:clamp(8px,1.1vw,11px);color:#a78bfa;text-align:center;margin-bottom:14px;font-style:italic;}
.charge-hint{font-size:clamp(7px,1vw,10px);color:#ffe066;background:rgba(255,220,50,0.12);border:1px solid rgba(255,220,50,0.3);border-radius:8px;padding:4px 10px;margin-bottom:10px;text-align:center;}
#hudBtns{display:flex;gap:5px;align-items:center;}
.hudBtn{
  padding:3px 10px;border:1px solid rgba(139,43,226,0.6);border-radius:16px;
  background:rgba(139,43,226,0.15);color:#c084fc;
  font-family:'Cinzel',serif;font-size:10px;cursor:pointer;letter-spacing:1px;
  transition:all 0.15s;
}
.hudBtn:hover{background:rgba(139,43,226,0.45);color:#fff;}
.hudBtn.pause{border-color:rgba(96,165,250,0.6);color:#93c5fd;}
.hudBtn.pause:hover{background:rgba(96,165,250,0.25);}
.sel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:440px;width:100%;margin-bottom:12px;}
.sel-btn{
  padding:8px 10px;border:2px solid rgba(139,43,226,0.4);border-radius:10px;
  background:rgba(139,43,226,0.1);color:#c084fc;font-family:'Cinzel',serif;
  font-size:clamp(8px,1.1vw,11px);cursor:pointer;transition:all 0.15s;text-align:center;
}
.sel-btn:hover,.sel-btn.active{background:rgba(139,43,226,0.45);border-color:#8b2be2;color:#fff;}
.sel-btn.easy{border-color:rgba(74,222,128,0.5);color:#86efac;}
.sel-btn.easy:hover,.sel-btn.easy.active{background:rgba(74,222,128,0.2);}
.sel-btn.hard{border-color:rgba(248,113,113,0.5);color:#fca5a5;}
.sel-btn.hard:hover,.sel-btn.hard.active{background:rgba(248,113,113,0.2);}
.sel-section{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:#a78bfa;text-transform:uppercase;margin-bottom:6px;text-align:center;}
</style>
</head>
<body>
<div id="hud">
  <div id="hudBtns">
    <button class="hudBtn pause" onclick="togglePause()" id="pauseBtn">⏸ Pause</button>
    <button class="hudBtn" onclick="showMenuOverlay()">☰ Menu</button>
  </div>
  <div class="hgroup">
    <span class="hlabel">🦄 Lives</span>
    <span class="hval hearts" id="lives1El">❤️❤️❤️</span>
  </div>
  <div class="hgroup">
    <span class="hlabel">HP</span>
    <div class="bar-wrap"><div class="bar-inner" id="hp1bar" style="background:linear-gradient(90deg,#f43f5e,#fb7185);width:100%"></div></div>
  </div>
  <div class="hgroup">
    <span class="hlabel">✨ Fly</span>
    <div class="bar-wrap"><div class="bar-inner" id="flybar" style="background:linear-gradient(90deg,#8b5cf6,#e879f9);width:100%"></div></div>
  </div>
  <div class="hgroup">
    <span class="hlabel">⚡ Charge</span>
    <div class="bar-wrap"><div class="bar-inner" id="chargebar" style="background:linear-gradient(90deg,#ffe066,#fff);width:0%"></div></div>
  </div>
  <div class="hgroup">
    <span class="hlabel">Score</span>
    <span class="hval" id="scoreEl">0</span>
  </div>
  <div class="hgroup">
    <span class="hlabel">Lvl</span>
    <span class="hval" id="lvlEl">1/5</span>
  </div>
  <div class="hgroup" id="p2hudG" style="display:none">
    <span class="hlabel">🐉 Lives</span>
    <span class="hval hearts" id="lives2El">❤️❤️❤️</span>
  </div>
  <div class="hgroup" id="p2hpG" style="display:none">
    <span class="hlabel">🐉 HP</span>
    <div class="bar-wrap"><div class="bar-inner" id="hp2bar" style="background:linear-gradient(90deg,#f97316,#fbbf24);width:100%"></div></div>
  </div>
</div>
<div id="wrapper">
  <canvas id="gc" width="960" height="520"></canvas>
  <div id="overlay" style="display:flex"></div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  PRINCESS & THE UNICORN  v2  —  Full Game Engine
// ════════════════════════════════════════════════════════
const C = document.getElementById('gc');
const ctx = C.getContext('2d');
const W = 960, H = 520;
const GROUND = H - 80;
const GRAVITY = 0.46;
const JUMP_V = -11.5;
const FLY_MAX = 380;      // much longer flight time
const FLY_REGEN = 1.8;    // faster regen on ground
const FLY_LIFT = -3.5;
const MAX_FALL = 14;
const LIVES_START = 3;
const HP_P1 = 6;
const HP_P2 = 6;
// Slower scroll than before
const SCROLL = [2.2, 2.6, 3.0, 3.4, 3.8];
// Enemy spawn intervals (larger = slower). Tuned very easy.
const ENEMY_RATES = [280, 240, 210, 185, 160];

let gState = 'title';
let numPlayers = 1;
let difficulty = 'normal'; // 'easy' | 'normal' | 'hard'
let gFrame = 0;
let score1 = 0, score2 = 0;
let curLevel = 1;
let worldX = 0;
let levelWorldLen = 0;
let bossSpawned = false;
let bossDefeated = false;
let knightFreed = false;
let lives1 = LIVES_START, lives2 = LIVES_START;

const keys = {}, prevKeys = {};
window.addEventListener('keydown', e => {
  const b=['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
           'KeyW','KeyA','KeyS','KeyD','KeyF','KeyQ','KeyE','ShiftLeft'];
  if(b.includes(e.code)) e.preventDefault();
  if(e.code==='KeyP'){ togglePause(); return; }
  keys[e.code] = true;
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
function justPressed(c){ return keys[c] && !prevKeys[c]; }

// ── LEVEL CONFIGS ─────────────────────────────────────
// Enemy spawn intervals — scale up aggressively on later levels
const ENEMY_RATES_OVERRIDE = [260, 210, 165, 130, 95];

const KNIGHT_COLORS = { blue:'#3b82f6', red:'#ef4444', yellow:'#eab308', green:'#22c55e', purple:'#a855f7' };
const KNIGHT_PLUME  = { blue:'#60a5fa', red:'#fca5a5', yellow:'#fde68a', green:'#86efac', purple:'#d8b4fe' };
const KNIGHT_DARK   = { blue:'#1d4ed8', red:'#991b1b', yellow:'#92400e', green:'#166534', purple:'#6b21a8' };

const LEVELS = [
  {
    id:1, name:'Sunlit Meadow',
    sky:['#7ec8e3','#b0e8b0'], ground:'#4a8c3f', groundTop:'#6dbf5a',
    wallColor:'#8b6914', platformColor:'#a0812a',
    tip:'Tap to jump, hold to fly. SPACE fires rainbows, hold for charge beam!',
    chargeTip:'Hold SPACE to charge the Rainbow Beam!',
    enemyTypes:['goblin_sword','goblin_archer','goblin_sword','goblin_archer','goblin_medium','goblin_sword'],
    bossType:'goblin_chief', bossHp:30,
    worldLen:4800, wallGap:580, wallFreq:0.09,
    allyType:'blue_knight',
    scenery:['flowers','hay','treeline','hill','flowers','treeline'],
    hasCastle:true, castleTheme:'meadow',
    groundDetail:'grass',
  },
  {
    id:2, name:'Whispering Mushroom Wood',
    sky:['#2a1a5e','#4a2878'], ground:'#2a1a08', groundTop:'#5a3a18',
    wallColor:'#4a2808', platformColor:'#3a1e06',
    tip:'Spore puffers explode on contact — shoot them from afar!',
    chargeTip:'Charge beam clears clusters of spore puffers!',
    enemyTypes:['spore_puffer','goblin_archer','goblin_sword','spore_puffer','goblin_medium','winged_lady','goblin_archer'],
    bossType:'mushroom_witch', bossHp:48,
    worldLen:5800, wallGap:500, wallFreq:0.10,
    allyType:'villager',
    scenery:['mushroom','darkTree','glowBug','fog','mushroom','darkTree'],
    hasCastle:true, castleTheme:'dark',
    groundDetail:'mushroom',
  },
  {
    id:3, name:'Volcanic Pass',
    sky:['#5c1a00','#8c2a00'], ground:'#2c0a00', groundTop:'#7a3200',
    wallColor:'#5a1c00', platformColor:'#4a1400',
    tip:'Rock golems take more hits. Lava river ahead — use the bridge!',
    chargeTip:'Rainbow Beam melts rock golems in one hit!',
    enemyTypes:['rock_golem','fire_imp','goblin_archer','rock_golem','goblin_medium','boulder','fire_imp'],
    bossType:'lava_dragon', bossHp:65,
    worldLen:6400, wallGap:480, wallFreq:0.09,
    allyType:'elf_archer',
    scenery:['lava','volcano','ashCloud','rockSpire','lava','ashCloud'],
    hasCastle:true, castleTheme:'volcanic',
    groundDetail:'scorched',
    hasLavaRiver:true,
    lavaStreams:3,
  },
  {
    id:4, name:'Frost Crystal Caverns',
    sky:['#0a1e3a','#0d2e6a'], ground:'#06101a', groundTop:'#1a3c6a',
    wallColor:'#1a3c6a', platformColor:'#102a58',
    tip:'Yetis charge fast — dodge sideways. Ice shards float and fire bolts!',
    chargeTip:'Beam shatters ice and chains to nearby enemies!',
    enemyTypes:['yeti','ice_archer','ice_shard','yeti','goblin_medium','shadow_knight','ice_shard'],
    bossType:'ice_queen', bossHp:80,
    worldLen:7000, wallGap:500, wallFreq:0.09,
    allyType:'red_knight',
    scenery:['icicle','icePillar','frozenPond','snowfall','icicle','icePillar'],
    hasCastle:true, castleTheme:'ice',
    groundDetail:'ice',
    lavaStreams:0,
  },
  {
    id:5, name:'Shadow Fortress',
    sky:['#05000a','#12001e'], ground:'#05000a', groundTop:'#1e0030',
    wallColor:'#240840', platformColor:'#180628',
    tip:'The Evil King rides a shadow dragon. Free the prisoner at the end!',
    chargeTip:'Fully charged beam can stagger the Evil King!',
    enemyTypes:['shadow_knight','goblin_archer','fire_imp','shadow_knight','goblin_medium','fire_imp','ice_shard','shadow_knight'],
    bossType:'evil_king', bossHp:160,
    worldLen:7600, wallGap:460, wallFreq:0.09,
    allyType:'royal_father',
    scenery:['darkPillar','gargoyle','boneGround','torchLight','darkPillar','gargoyle'],
    hasCastle:true, castleTheme:'shadow',
    groundDetail:'dark',
    lavaStreams:3,
  },
];

// ── ENTITIES ──────────────────────────────────────────
let p1, p2;
let enemies=[], projectiles=[], particles=[], walls=[], platforms=[], sceneryItems=[];
let boss=null, enemySpawnTimer=0;
// Single knight for current level (legacy), plus persistent array of all freed knights
let knight = null;
let allKnights = [];  // persists across levels
let savedKnights = []; // snapshot of knights at the START of current level (for retry)

// Charge beam state
let chargeBeam = { charging:false, level:0, maxLevel:180, firing:false, fireTimer:0, cooldown:0, cooldownMax:220 };

function makeP1(x,y){
  return {
    id:1, type:'princess', x, y, w:44, h:62,
    vx:0, vy:0, onGround:false,
    hp:HP_P1, maxHp:HP_P1, dead:false, deadTimer:0,
    flyFuel:FLY_MAX, flying:false,
    shielding:false,
    shootCool:0, shootRate:20,
    invincible:0,
    facing:1, animT:0, animF:0,
  };
}
function makeP2(x,y){
  return {
    id:2, type:'dragon', x, y, w:50, h:58,
    vx:0, vy:0, onGround:false,
    hp:HP_P2, maxHp:HP_P2, dead:false, deadTimer:0,
    flyFuel:FLY_MAX*0.8, flying:false,
    shielding:false,
    shootCool:0, shootRate:28,
    invincible:0,
    facing:1, animT:0, animF:0, colorT:0, colorIdx:0,
    autoFireTimer:0,
  };
}
function diffMult(){ return difficulty==='easy'?0.55:difficulty==='hard'?1.6:1.0; }
function diffRateDiv(){ return difficulty==='easy'?1.7:difficulty==='hard'?0.65:1.0; }

function makeBoss(type, x, cfg){
  const hpMult = diffMult();
  // Scale HP by number of freed knights (each knight adds 20%, up to +100%)
  const knightBonus = 1 + Math.min(allKnights.length, 5) * 0.20;
  const totalHp = Math.ceil(cfg.bossHp * hpMult * knightBonus);
  return {
    type, x, y:GROUND-(type==='evil_king'?120:100),
    w:type==='evil_king'?100:88, h:type==='evil_king'?120:100,
    hp:totalHp, maxHp:totalHp,
    vx:0, vy:0, onGround:false,
    animT:0, animF:0,
    shootCool:0, shootRate:75,
    shielding:false, shieldTimer:0, shieldHitsLeft:4,
    enraged:false, alive:true,
    pattern:0, patternTimer:0,
  };
}

// ── WORLD GEN ─────────────────────────────────────────
function generateLevel(lv){
  const cfg = LEVELS[lv-1];
  walls=[]; platforms=[]; sceneryItems=[];
  enemies=[]; projectiles=[]; particles=[];
  boss=null; bossSpawned=false; bossDefeated=false; knightFreed=false;
  knight=null;
  // allKnights persists across levels
  levelWorldLen = cfg.worldLen;
  worldX = 0; enemySpawnTimer = 0; mediumTrollTimer = 0;
  chargeBeam = { charging:false, level:0, maxLevel:180, firing:false, fireTimer:0, cooldown:0, cooldownMax:220 };

  // ── Platforms (floating stepping stones) ──
  let px = 450;
  while(px < levelWorldLen - 1400){
    const pw = 90 + Math.floor(Math.random()*100);
    const ph = GROUND - 110 - Math.floor(Math.random()*110);
    platforms.push({ x:px, y:ph, w:pw, h:16 });
    px += 280 + Math.floor(Math.random()*260);
  }

  // ── Walls (fewer — just for cover, not maze) ──
  let wx = 700;
  while(wx < levelWorldLen - 1400){
    if(Math.random() < cfg.wallFreq){
      const wh = 55 + Math.floor(Math.random()*50);
      walls.push({ x:wx, y:GROUND-wh, w:22, h:wh+60, cover:true });
    }
    wx += cfg.wallGap + Math.floor(Math.random()*300);
  }
  // Boss arena — just one low cover rock for the player to duck behind
  walls.push({ x:levelWorldLen-620, y:GROUND-55, w:28, h:55+60, cover:true });

  // Knight cage at the far end
  walls.push({ x:levelWorldLen-210, y:GROUND-300, w:80, h:300+60, isCage:true });

  // ── Scenery (visual variety — rivers, trees, rocks, etc.) ──
  generateScenery(lv, cfg);

  // ── Castle landmark — placed about 60% through the level ──
  if(cfg.hasCastle){
    const castleX = Math.floor(levelWorldLen * 0.58);
    sceneryItems.push({ x:castleX, y:GROUND, type:'castle', seed:Math.random(), theme:cfg.castleTheme||'meadow', big:true });

    // Castle interior: add a floor platform inside the main gatehouse
    // The gatehouse arch starts at roughly castleX + cw*0.37 (cw=320) = +118
    // and extends ~84px wide. Floor is partway up = GROUND - 80
    const gateX = castleX + 100;
    const gateW = 120;
    // Ground floor interior (player can walk inside)
    platforms.push({ x:gateX, y:GROUND-2, w:gateW, h:8, isCastleFloor:true });
    // Upper balcony platform
    platforms.push({ x:gateX+14, y:GROUND-90, w:gateW-28, h:10, isCastleFloor:true });
    // Left tower interior floor
    platforms.push({ x:castleX+4,  y:GROUND-2, w:62, h:8, isCastleFloor:true });
    // Right tower interior floor
    platforms.push({ x:castleX+254, y:GROUND-2, w:62, h:8, isCastleFloor:true });
  }

  // ── Lava river with rope bridge ──
  if(cfg.hasLavaRiver){
    const rx = 800 + Math.floor(Math.random()*500);
    if(rx < levelWorldLen - 1600){
      sceneryItems.push({x:rx, y:GROUND, type:'lavaRiver', seed:Math.random(), rw:190});
      // Rope & plank bridge — 5 planks across the river
      for(let pi=0;pi<5;pi++) platforms.push({x:rx+16+pi*36,y:GROUND-10,w:32,h:10,isBridge:true});
      // Lava creatures flanking the river
      sceneryItems.push({x:rx-40, y:GROUND, type:'lavaCreature', seed:Math.random(), spawnTimer:0, side:'left'});
      sceneryItems.push({x:rx+200, y:GROUND, type:'lavaCreature', seed:Math.random(), spawnTimer:0, side:'right'});
    }
  }

  // ── Lava streams that cross the walkway ──
  const nStreams = cfg.lavaStreams||0;
  let lsx = 500;
  for(let si=0;si<nStreams;si++){
    lsx += 500+Math.floor(Math.random()*500);
    if(lsx < levelWorldLen-1000)
      sceneryItems.push({x:lsx, y:GROUND, type:'lavaStream', seed:Math.random(), phase:Math.random()*Math.PI*2});
  }
}

function generateScenery(lv, cfg){
  // Place varied scenery elements at random intervals
  const types = cfg.scenery;
  let sx = 200;
  while(sx < levelWorldLen - 200){
    const t = types[Math.floor(Math.random()*types.length)];
    // Avoid placing scenery right on top of walls/platforms
    sceneryItems.push({ x:sx, y:GROUND, type:t, seed:Math.random() });
    sx += 120 + Math.floor(Math.random()*160);
  }
}

// ── ENEMY SPAWN ───────────────────────────────────────
let mediumTrollTimer = 0;
function spawnEnemies(){
  if(bossSpawned) return;
  enemySpawnTimer++;
  const baseRate = (typeof ENEMY_RATES_OVERRIDE!=="undefined") ? ENEMY_RATES_OVERRIDE[curLevel-1] : ENEMY_RATES[curLevel-1];
  const twoPlayerBonus = numPlayers===2 ? 0.65 : 1.0; // 35% faster spawns in 2P
  const rate = Math.floor(baseRate * diffRateDiv() * twoPlayerBonus);
  if(enemySpawnTimer < rate) return;
  enemySpawnTimer = 0;

  const pWX = worldX + (p1?p1.x:400);
  if(pWX > levelWorldLen - 1200) return;

  const cfg = LEVELS[curLevel-1];

  // 30% chance: place on a visible platform ahead
  if(Math.random()<0.30){
    const nearby = platforms.filter(pl=>{
      const plsx = pl.x - worldX;
      return plsx > W && plsx < W+320 && !pl.isBridge;
    });
    if(nearby.length>0){
      const pl = nearby[Math.floor(Math.random()*nearby.length)];
      const groundTypes=['goblin_sword','goblin_archer','troll_sword','troll_archer',
                         'ice_archer','rock_golem','yeti','shadow_knight','goblin_medium','troll_medium'];
      const validTypes = groundTypes.filter(t2=>cfg.enemyTypes.includes(t2));
      if(validTypes.length>0){
        const t2 = validTypes[Math.floor(Math.random()*validTypes.length)];
        spawnEnemyAt(t2, pl.x+pl.w/2-18, pl.y, true);
        // also do normal ground spawn
      }
    }
  }

  const t = cfg.enemyTypes[Math.floor(Math.random()*cfg.enemyTypes.length)];
  spawnEnemy(t, worldX + W + 60);

  mediumTrollTimer++;
  if(mediumTrollTimer >= 520 - curLevel*40){
    mediumTrollTimer = 0;
    spawnEnemy('troll_medium', worldX + W + 80);
  }
}

// Spawn an enemy at a specific world position and Y (for platforms)
function spawnEnemyAt(type, worldPosX, platformY, onPlatform){
  spawnEnemy(type, worldPosX);
  const e = enemies[enemies.length-1];
  if(e && onPlatform){
    e.y = platformY - e.h;
    e.onPlatform = true;
    e.platformY = platformY;
    e.onGround = true;
    e.vx = 0; // stand still on platform (don't walk off)
  }
}

    case 'goblin_medium': e.hp=2+Math.ceil(curLevel*0.7); e.maxHp=e.hp; e.w=46; e.h=84; e.y=GROUND-84; e.vy=0.1; break;

    case 'fire_imp':      e.hp=1+curLevel; e.maxHp=e.hp; e.y=GROUND-160-Math.random()*60; e.w=30; e.h=38;

    case 'boulder':       e.hp=1; e.maxHp=1; e.y=GROUND-200-Math.random()*50; e.w=28; e.h=28; e.vy=1.5; break;
    // Ice creatures
    case 'yeti':          e.hp=2+Math.ceil(curLevel*0.8); e.maxHp=e.hp; e.w=48; e.h=88; e.y=GROUND-88; e.vy=0.1; break;
    case 'ice_archer':    e.hp=1+Math.floor(curLevel*0.4); e.maxHp=e.hp; e.shootRate=90; e.w=32; e.h=72; e.y=GROUND-72; e.vy=0.1; break;
    case 'ice_shard':     e.hp=1; e.maxHp=1; e.y=GROUND-180-Math.random()*50; e.w=22; e.h=32;

    // Shadow enemies
    case 'shadow_knight': e.hp=2+Math.ceil(curLevel*0.7); e.maxHp=e.hp; e.w=38; e.h=78; e.y=GROUND-78; e.vy=0.1; break;
    // Legacy cross-level

    case 'troll_axe':     e.hp=2+Math.ceil(curLevel*0.5); e.maxHp=e.hp; e.w=38; e.h=54; break;

    case 'winged_lady':   e.hp=2+curLevel; e.maxHp=e.hp; e.y=GROUND-180-Math.random()*60; e.w=36; e.h=48;

    case 'troll_medium':  e.hp=2+Math.ceil(curLevel*0.8); e.maxHp=e.hp; e.w=48; e.h=82; e.y=GROUND-82; e.vy=0.1; break;

// ── PHYSICS ───────────────────────────────────────────
function applyGravity(o){ if(!o.flying) o.vy=Math.min(o.vy+GRAVITY,MAX_FALL); }

function groundCheck(o){
  o.onGround=false;
  if(o.y+o.h>=GROUND){ o.y=GROUND-o.h; o.vy=0; o.onGround=true; }
  platforms.forEach(pl=>{
    const sx=pl.x-worldX;
    if(o.x<sx+pl.w&&o.x+o.w>sx&&o.y+o.h>=pl.y&&o.y+o.h<=pl.y+pl.h+8&&o.vy>=0){
      o.y=pl.y-o.h; o.vy=0; o.onGround=true;
    }
  });
}
function wallCheck(o){
  walls.forEach(wl=>{
    if(wl.isCage) return;
    const sx=wl.x-worldX;
    if(o.x<sx+wl.w&&o.x+o.w>sx&&o.y<GROUND&&o.y+o.h>wl.y){
      const ol=(o.x+o.w)-sx, or2=(sx+wl.w)-o.x;
      if(ol<or2){ o.x-=ol; if(o.vx>0)o.vx=0; }
      else { o.x+=or2; if(o.vx<0)o.vx=0; }
    }
  });
}

function wallCheckEnemy(e){
  // enemies use worldX, so we compare directly in world space
  walls.forEach(wl=>{
    if(wl.isCage) return;
    // world-space overlap check
    if(e.worldX < wl.x+wl.w && e.worldX+e.w > wl.x &&
       e.y < GROUND && e.y+e.h > wl.y){
      const ol=(e.worldX+e.w)-wl.x, or2=(wl.x+wl.w)-e.worldX;
      if(ol<or2){ e.worldX-=ol; if(e.vx>0)e.vx=0; }
      else       { e.worldX+=or2; if(e.vx<0)e.vx=0; }
    }
  });
}
// P1 = Arrow keys (1P also accepts WASD; 2P: P1=arrows only, P2=WASD)
function p1Left()  { return keys['ArrowLeft']  || (numPlayers===1&&keys['KeyA']); }
function p1Right() { return keys['ArrowRight'] || (numPlayers===1&&keys['KeyD']); }
function p1Up()    { return keys['ArrowUp']    || (numPlayers===1&&keys['KeyW']); }
function p1Down()  { return keys['ArrowDown']  || (numPlayers===1&&keys['KeyS']); }
function p1Fire()  { return keys['Space']; }
// P2 = WASD + F
function p2Left()  { return keys['KeyA']; }
function p2Right() { return keys['KeyD']; }
function p2Up()    { return keys['KeyW']; }
function p2Down()  { return keys['KeyS']; }
function p2Fire()  { return keys['KeyF']; }

function updateP1(){
  if(!p1) return;
  if(p1.dead){
    p1.deadTimer++;
    if(p1.deadTimer>120){
      p1.dead=false; p1.deadTimer=0;
      lives1--;
      updateHUD();
      if(lives1<=0){ checkAllDead(); return; }
      resetPlayer(p1,100,GROUND-80);
    }
    return;
  }
  if(p1.invincible>0) p1.invincible--;

  const left=p1Left(), right=p1Right(), up=p1Up(), down=p1Down();
  const SPEED=5.5;
  if(left){p1.vx=-SPEED;p1.facing=-1;}
  else if(right){p1.vx=SPEED;p1.facing=1;}
  else p1.vx*=0.72;

  p1.shielding = down && !p1.flying;

  // Jump
  if(p1.onGround&&(justPressed('ArrowUp')||(numPlayers===1&&justPressed('KeyW')))){
    p1.vy=JUMP_V; p1.flying=false;
  }
  // Fly
  if(!p1.onGround&&up&&p1.flyFuel>0){
    p1.flying=true; p1.vy=FLY_LIFT; p1.flyFuel-=2.0;
    if(p1.flyFuel<=0){p1.flying=false;p1.flyFuel=0;}
  } else if(!up||p1.onGround){ p1.flying=false; }
  if(p1.onGround) p1.flyFuel=Math.min(FLY_MAX,p1.flyFuel+FLY_REGEN);

  if(!p1.flying) applyGravity(p1);
  p1.x+=p1.vx; p1.y+=p1.vy;
  p1.x=Math.max(0,Math.min(W-p1.w-2,p1.x));
  groundCheck(p1); wallCheck(p1);

  // Camera scroll — forward
  if(p1.x>W*0.52&&worldX<levelWorldLen-W){
    const sc=SCROLL[curLevel-1]*(right?1.1:1);
    worldX=Math.min(worldX+sc,levelWorldLen-W);
    p1.x-=sc; p1.x=Math.max(0,p1.x);
  }
  // Camera scroll — backward (player can go back)
  if(p1.x<W*0.22&&worldX>0){
    const sc=SCROLL[curLevel-1];
    worldX=Math.max(0,worldX-sc);
    p1.x+=sc; p1.x=Math.min(W-p1.w-2,p1.x);
  }

  // ── SHOOT LOGIC ──
  // Cooldown only blocks the charge beam, never the rainbow
  if(chargeBeam.cooldown>0) chargeBeam.cooldown--;

  if(p1Fire()&&!p1.shielding){
    // Only charge if cooldown has expired
    if(chargeBeam.cooldown<=0){
      if(!chargeBeam.charging) chargeBeam.charging=true;
      chargeBeam.level=Math.min(chargeBeam.maxLevel, chargeBeam.level+1.4);
    } else {
      // Cooldown active — fire plain rainbow every tap (justPressed so no spam)
      if(justPressed('Space')){
        fireRainbow(p1);
      }
    }
  } else if(chargeBeam.charging){
    // Key released while charging
    chargeBeam.charging=false;
    if(chargeBeam.level>20){
      fireChargeBeam(p1, chargeBeam.level);
      chargeBeam.cooldown=chargeBeam.cooldownMax;
    } else {
      // Was a tap, not a hold — fire rainbow, no cooldown
      fireRainbow(p1);
    }
    chargeBeam.level=0;
  }

  // Animate
  p1.animT++; if(p1.animT>7){p1.animT=0;p1.animF=(p1.animF+1)%4;}

  // Boss trigger
  if(worldX>levelWorldLen-1300&&!bossSpawned){
    bossSpawned=true;
    const cfg=LEVELS[curLevel-1];
    boss=makeBoss(cfg.bossType,worldX+W+60,cfg);
  }
}

function updateP2(){
  if(!p2) return;
  if(p2.dead){
    p2.deadTimer++;
    if(p2.deadTimer>120){
      p2.dead=false; p2.deadTimer=0;
      lives2--;
      updateHUD();
      if(lives2<=0){ checkAllDead(); return; }
      resetPlayer(p2,60,GROUND-80);
    }
    return;
  }
  if(p2.invincible>0) p2.invincible--;

  const left=p2Left(), right=p2Right(), up=p2Up();
  const SPEED=5.5;
  if(left){p2.vx=-SPEED;p2.facing=-1;}
  else if(right){p2.vx=SPEED;p2.facing=1;}
  else p2.vx*=0.72;

  // Jump
  if(p2.onGround&&justPressed('KeyW')){p2.vy=JUMP_V;p2.flying=false;}
  // Fly
  if(!p2.onGround&&up&&p2.flyFuel>0){
    p2.flying=true; p2.vy=FLY_LIFT; p2.flyFuel-=2.3;
    if(p2.flyFuel<=0){p2.flying=false;p2.flyFuel=0;}
  } else if(!up||p2.onGround){ p2.flying=false; }
  if(p2.onGround) p2.flyFuel=Math.min(FLY_MAX*0.8,p2.flyFuel+FLY_REGEN*0.85);

  if(!p2.flying) applyGravity(p2);
  p2.x+=p2.vx; p2.y+=p2.vy;
  p2.x=Math.max(0,Math.min(W-p2.w-2,p2.x));
  groundCheck(p2); wallCheck(p2);

  // Shoot — manual F key only
  if(p2.shootCool>0) p2.shootCool--;
  if(p2Fire()&&p2.shootCool<=0){
    fireFireball(p2);
    p2.shootCool=p2.shootRate;
  }

  p2.animT++; if(p2.animT>7){p2.animT=0;p2.animF=(p2.animF+1)%4;}
  p2.colorT++; if(p2.colorT>45){p2.colorT=0;p2.colorIdx=(p2.colorIdx+1)%7;}
}

function resetPlayer(pl,x,y){
  pl.x=x;pl.y=y;pl.vx=0;pl.vy=0;
  pl.hp=pl.maxHp;pl.dead=false;pl.deadTimer=0;
  pl.invincible=90;pl.flying=false;pl.flyFuel=FLY_MAX;pl.shielding=false;
  pl.animT=0;pl.animF=0;
}

function checkAllDead(){
  if(numPlayers===1&&lives1<=0){ showEndScreen(false); return; }
  if(numPlayers===2&&lives1<=0&&lives2<=0){ showEndScreen(false); return; }
}
