// ── PROJECTILES ───────────────────────────────────────
const RAINBOW_COLS=['#ff4466','#ff8800','#ffee00','#44ee88','#44aaff','#aa44ff','#ff44cc'];
// ── CARTOON DRAWING HELPERS ──────────────────────────
function cRR(x,y,w,h,r,fill,stroke,lw){
  ctx.beginPath();
  r=Math.min(r,w/2,h/2);
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||2;ctx.stroke();}
}
function cEl(x,y,rx,ry,fill,stroke,lw){
  ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||2;ctx.stroke();}
}
function drawHPBar(x,y,w,hp,maxHp,col){
  col=col||'#44bb22';
  ctx.fillStyle='rgba(0,0,0,0.55)';cRR(x,y,w,7,3,null,null);ctx.fill();
  const pct=Math.max(0,hp/maxHp);
  ctx.fillStyle=col;cRR(x,y,pct*w,7,3,null,null);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;cRR(x,y,w,7,3,null,null);ctx.stroke();
}


function fireRainbow(pl){
  projectiles.push({
    kind:'rainbow',owner:'p1',
    x:pl.x+(pl.facing>0?pl.w:0), y:pl.y+8,
    vx:pl.facing*5.5, vy:-0.2,
    w:20, h:10, alive:true, colorT:0, colorIdx:0,
  });
}
function fireFireball(pl){
  projectiles.push({
    kind:'fireball',owner:'p2',
    x:pl.x+(pl.facing>0?pl.w:0), y:pl.y+22,
    vx:pl.facing*10, vy:0,
    w:18, h:18, alive:true, t:0,
  });
}

// Charge beam: a wide beam that travels across the screen
function fireChargeBeam(pl, chargeLevel){
  const power = chargeLevel / chargeBeam.maxLevel; // 0..1
  const beamW = 28 + power*30;
  const beamH = 14 + power*20;
  const speed = 14;
  const pierce = power > 0.6; // pierces through if well charged
  projectiles.push({
    kind:'beam',owner:'p1',
    x:pl.x+(pl.facing>0?pl.w+2:-(beamW)),
    y:pl.y+10,
    vx:pl.facing*speed, vy:0,
    w:beamW, h:beamH,
    alive:true, colorT:0, colorIdx:0,
    power, pierce,
    pierceLeft:2, // max 2 enemies pierced
    damage: Math.max(2, Math.ceil(power*4)),
    t:0,
  });
  // Visual burst
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2,s=3+Math.random()*7;
    particles.push({x:pl.x+pl.w/2,y:pl.y+20,
      vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      col:RAINBOW_COLS[Math.floor(Math.random()*7)],
      life:28+Math.random()*18,sz:4+Math.random()*6});
  }
}

function fireBossShot(b, vx, vy, kind='bossshot'){
  projectiles.push({
    kind, owner:'boss',
    x:b.x+b.w/2, y:b.y+30,
    vx, vy, w:15, h:15, alive:true, t:0,
  });
}
function fireEnemyShot(e, kind, vx, vy){
  projectiles.push({
    kind, owner:'enemy',
    x:e.worldX+(e.facing>0?e.w:0), y:e.y+e.h*0.4,
    vx, vy, w:14, h:7, alive:true, t:0,
  });
}

// ── ENEMY UPDATE ──────────────────────────────────────
function updateEnemies(){
  spawnEnemies();
  const targets=[p1,p2].filter(p=>p&&!p.dead);

  enemies.forEach(e=>{
    if(!e.alive) return;
    const sx=e.worldX-worldX;
    if(sx<-120||sx>W+120){e.alive=false;return;}
    e.aiTimer++;
    const nearPl=targets.reduce((best,pl)=>{
      return !best||Math.abs(pl.x-(e.worldX-worldX))<Math.abs(best.x-(e.worldX-worldX))?pl:best;
    }, null);
    const tx=nearPl?nearPl.x:300;
    const dist=Math.abs(sx-tx);

    // ── Aerial enemies ──
    const isAerial = e.type==='fire_imp'||e.type==='ice_shard'||e.type==='winged_lady';
    if(isAerial){
      e.wobble=(e.wobble||0)+0.045;
      e.y=Math.max(GROUND-280,Math.min(GROUND-70,e.y+Math.sin(e.wobble)*2.4));
      e.vx=sx>tx+60?-(1.5+curLevel*0.12):(sx<tx-20?0.5:0);
      e.worldX+=e.vx; e.facing=e.vx<0?-1:1;
      e.shootCool++;
      if(e.shootCool>=(e.shootRate||85)&&dist<500&&nearPl){
        e.shootCool=0;
        const dx=nearPl.x-sx, dy=(nearPl.y+nearPl.h*0.4)-e.y;
        const len=Math.sqrt(dx*dx+dy*dy)||1;
        const spd=6+curLevel*0.3;
        const kind=e.type==='ice_shard'?'iceshard':(e.type==='fire_imp'?'fireball':'javelin');
        fireEnemyShot(e,kind,(dx/len)*spd,(dy/len)*spd*0.65);
      }
      e.animT++;if(e.animT>5){e.animT=0;e.animF=(e.animF+1)%2;}
      return;
    }
    if(e.type==='boulder'){
      e.vy=Math.min(e.vy+GRAVITY,MAX_FALL); e.y+=e.vy; e.worldX+=e.vx;
      if(e.y+e.h>=GROUND){e.alive=false;spawnSmoke(sx,GROUND-10,6);}
      targets.forEach(pl=>{if(Math.abs(pl.x-sx)<40&&Math.abs(pl.y-e.y)<40&&pl.invincible<=0&&!pl.shielding)hitPlayer(pl,1);});
      return;
    }
    if(e.type==='spore_puffer'){
      e.wobble=(e.wobble||0)+0.09;
      const bounce=Math.abs(Math.sin(e.wobble))*28;
      e.y=GROUND-e.h-bounce;
      e.vx=dist>50?-(1.2+curLevel*0.12):0;
      e.worldX+=e.vx; e.facing=e.vx<0?-1:1;
      targets.forEach(pl=>{
        if(pl.invincible<=0&&Math.abs((e.worldX-worldX)-pl.x)<36&&Math.abs(e.y-pl.y)<38){
          hitPlayer(pl,1);e.alive=false;bigExplosion(e.worldX-worldX,e.y);
        }
      });
      e.animT++;if(e.animT>5){e.animT=0;e.animF=(e.animF+1)%2;}
      return;
    }
    // Ground enemies — always apply gravity, land on GROUND or any platform
    applyGravity(e); e.y+=e.vy;
    e.onGround=false;
    // Check GROUND
    if(e.y+e.h>=GROUND){e.y=GROUND-e.h;e.vy=0;e.onGround=true;e.onPlatform=false;}
    // Check platforms
    if(!e.onGround){
      platforms.forEach(pl=>{
        const plsx=pl.x-worldX;
        const esx=e.worldX-worldX;
        if(esx<plsx+pl.w&&esx+e.w>plsx&&e.y+e.h>=pl.y&&e.y+e.h<=pl.y+pl.h+10&&e.vy>=0){
          e.y=pl.y-e.h;e.vy=0;e.onGround=true;
          e.onPlatform=true;e.platformY=pl.y;
        }
      });
    }
    // If enemy walked off a platform edge, clear platform flag so gravity pulls them down
    if(e.onPlatform&&!e.onGround){e.onPlatform=false;e.platformY=null;}
    const isSlow=e.type==='rock_golem'||e.type==='yeti';
    e.vx=dist>65?-(isSlow?0.9+curLevel*0.08:1.4+curLevel*0.15):0;
    e.worldX+=e.vx; e.facing=e.vx<0?-1:1;
    wallCheckEnemy(e);
    // Ranged attacks
    const isArcher=e.type==='goblin_archer'||e.type==='troll_archer'||e.type==='ice_archer';
    if(isArcher&&dist<600&&e.onGround){
      e.shootCool++;
      if(e.shootCool>=(e.shootRate||100)){
        e.shootCool=0;
        if(nearPl){
          const adx=nearPl.x-sx, ady=(nearPl.y+20)-e.y;
          const alen=Math.sqrt(adx*adx+ady*ady)||1;
          const kind=e.type==='ice_archer'?'iceshard':'arrow';
          fireEnemyShot(e,kind,(adx/alen)*7,(ady/alen)*7*0.55);
        }
      }
    }
    if(e.type==='troll_javelin'&&dist<560&&e.onGround){
      e.shootCool++;
      if(e.shootCool>=(e.shootRate||120)){
        e.shootCool=0;
        const dir=sx>tx?-1:1;
        fireEnemyShot(e,'javelin',dir*5.5,-2.8);
      }
    }
    // Melee attacks
    const isMelee=e.type==='goblin_sword'||e.type==='troll_sword'||e.type==='troll_axe'||
                  e.type==='goblin_medium'||e.type==='rock_golem'||e.type==='yeti'||
                  e.type==='shadow_knight'||e.type==='troll_medium';
    if(isMelee&&dist<60){
      targets.forEach(pl=>{if(pl.invincible<=0&&!pl.shielding)hitPlayer(pl,1);});
    }
    e.animT++;if(e.animT>8){e.animT=0;e.animF=(e.animF+1)%2;}
  });
  enemies=enemies.filter(e=>e.alive);
}

// ── BOSS UPDATE ───────────────────────────────────────
function updateBoss(){
  if(!boss||!boss.alive) return;
  const b=boss; b.shielding=false; // no shield
  const bsx=b.x-worldX;
  b.enraged=b.hp<b.maxHp*0.4;
  const spd=b.enraged?3.0+curLevel*0.25:2.0+curLevel*0.18;

  b.patternTimer++;
  if(b.patternTimer>(b.enraged?50:80)){b.patternTimer=0;b.pattern=(b.pattern+1)%4;}

  const targets=[p1,p2].filter(p=>p&&!p.dead);
  if(!targets.length) return;
  const pl=targets.reduce((cl,t)=>Math.abs(t.x-(bsx+b.w/2))<Math.abs(cl.x-(bsx+b.w/2))?t:cl,targets[0]);
  const distX=bsx+b.w/2-pl.x-pl.w/2;
  const distAbs=Math.abs(distX);

  // Movement — always active, pattern-based
  if(b.pattern===0){
    b.vx=distX>0?-spd*1.2:spd*1.2;
  } else if(b.pattern===1){
    const ideal=200; b.vx=distAbs>ideal+40?(distX>0?-spd:spd):(distAbs<ideal-40?(distX>0?spd*0.8:-spd*0.8):b.vx*0.85);
  } else if(b.pattern===2){
    b.vx=distX>0?spd*0.6:-spd*0.6; // orbit
  } else {
    b.vx=b.enraged?(distX>0?-spd*1.8:spd*1.8):(distX>0?-spd:spd); // dash
  }
  b.x+=b.vx; b.facing=b.vx<0?-1:1;
  b.x=Math.max(worldX+20,Math.min(worldX+W-b.w-20,b.x));

  // Vertical
  const isFloat=b.type==='mushroom_witch'||b.type==='ice_queen';
  if(isFloat){
    b.y=GROUND-b.h-55+Math.sin(gFrame*0.045)*32;
  } else {
    b.vy=Math.min(b.vy+GRAVITY,MAX_FALL); b.y+=b.vy;
    if(b.y+b.h>=GROUND){b.y=GROUND-b.h;b.vy=0;}
    if(b.enraged&&b.y+b.h>=GROUND&&b.pattern===3)b.vy=-12;
  }

  // Shooting
  b.shootCool++;
  const rate=b.enraged?Math.max(20,b.shootRate*0.4):b.shootRate;
  if(b.shootCool>=rate){
    b.shootCool=0;
    const dx=pl.x+pl.w/2-(bsx+b.w/2), dy=pl.y+pl.h/2-(b.y+b.h/2);
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const shots=b.enraged?2:1;
    if(b.type==='goblin_chief'){
      for(let s=0;s<shots;s++) fireBossShot(b,(dx/len)*6.5+(s-(shots-1)/2)*0.3,(dy/len)*5,'rock');
      if(b.enraged) fireBossShot(b,(dx/len)*9,(dy/len)*6,'bossshot');
    } else if(b.type==='mushroom_witch'){
      const fc=b.enraged?5:3;
      for(let i=0;i<fc;i++){const a=Math.atan2(dy,dx)+(i-(fc-1)/2)*0.3;fireBossShot(b,Math.cos(a)*7,Math.sin(a)*5,'spore');}
    } else if(b.type==='lava_dragon'){
      for(let s=0;s<shots;s++) fireBossShot(b,(dx/len)*8+(s-(shots-1)/2)*0.25,(dy/len)*6,'fireball');
      if(b.enraged&&gFrame%90===0) for(let i=0;i<5;i++){const a=Math.atan2(dy,dx)+(i-2)*0.22;fireBossShot(b,Math.cos(a)*9,Math.sin(a)*6,'fireball');}
    } else if(b.type==='ice_queen'){
      const fc=b.enraged?4:2;
      for(let i=0;i<fc;i++){const a=Math.atan2(dy,dx)+(i-(fc-1)/2)*0.35;fireBossShot(b,Math.cos(a)*7.5,Math.sin(a)*5.5,'iceshard');}
      if(b.enraged&&gFrame%120===0) for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;fireBossShot(b,Math.cos(a)*6,Math.sin(a)*6,'iceshard');}
    } else if(b.type==='evil_king'){
      for(let s=0;s<shots;s++) fireBossShot(b,(dx/len)*7+(s-(shots-1)/2)*0.22,(dy/len)*5.5,'bossshot');
      if(b.enraged) fireBossShot(b,(dx/len)*9,(dy/len)*7,'bossshot');
      if(gFrame%160===0) fireBossShot(b,(b.facing<0?-1:1)*4,-9,'rock');
    } else {
      for(let s=0;s<shots;s++) fireBossShot(b,(dx/len)*6.5+(s-(shots-1)/2)*0.22,(dy/len)*4.5,'bossshot');
    }
  }

  // Boss melee damage — if touching a player, hurt them
  const bsx2=b.x-worldX;
  [p1,p2].forEach(pl=>{
    if(!pl||pl.dead||pl.invincible>0) return;
    if(bsx2<pl.x+pl.w+10&&bsx2+b.w>pl.x-10&&b.y<pl.y+pl.h&&b.y+b.h>pl.y){
      hitPlayer(pl, b.enraged?2:1);
    }
  });

  b.animT++;if(b.animT>6){b.animT=0;b.animF=(b.animF+1)%2;}
  if(b.hp<=0){
    b.alive=false; bossDefeated=true;
    bigExplosion(bsx+b.w/2,b.y+b.h/2);
    score1+=400*curLevel; updateHUD();
    setTimeout(()=>{knightFreed=true; initKnight();},1200);
    setTimeout(()=>{ if(curLevel<5) nextLevel(); else showEndScreen(true); },3500);
  }
}
// ── PROJECTILE UPDATE ────────────────────────────────
function updateProjectiles(){
  const pls=[p1,p2].filter(p=>p&&!p.dead);
  projectiles.forEach(proj=>{
    if(!proj.alive) return;
    proj.x+=proj.vx; proj.y+=proj.vy; proj.t++;
    if(proj.kind==='rock'||proj.kind==='lavaBlob'||proj.kind==='spore') proj.vy=Math.min(proj.vy+0.38,12);
    if(proj.kind==='fireball') proj.vy=Math.min(proj.vy+0.12,8);
    if(proj.x<-60||proj.x>W+60||proj.y<-60||proj.y>H+60){proj.alive=false;return;}
    // Wall collision — player/knight shots blocked, floating boss shots pass through
    const pierceWalls=proj.owner==='boss'; // boss shots always pierce walls
    let walled=false;
    walls.forEach(wl=>{
      if(wl.isCage||!proj.alive||pierceWalls) return;
      const wsx=wl.x-worldX;
      if(proj.x<wsx+wl.w&&proj.x+proj.w>wsx&&proj.y<GROUND&&proj.y+proj.h>wl.y){
        proj.alive=false; walled=true; spawnSmoke(proj.x,proj.y,4);
      }
    });
    if(walled) return;
    if((proj.kind==='rock'||proj.kind==='lavaBlob')&&proj.y+proj.h>=GROUND){proj.alive=false;spawnSmoke(proj.x,GROUND-8,5);return;}

    if(proj.owner==='p1'||proj.owner==='p2'){
      let hitSomething=false;
      enemies.forEach(e=>{
        if(!e.alive||(!proj.alive&&proj.kind!=='beam')) return;
        const esx=e.worldX-worldX;
        if(proj.x<esx+e.w&&proj.x+proj.w>esx&&proj.y<e.y+e.h&&proj.y+proj.h>e.y){
          const dmg=proj.damage||1;
          e.hp-=dmg;
          if(proj.kind!=='beam'){ proj.alive=false; }
          else if(proj.kind==='beam'){
            proj.pierceLeft=(proj.pierceLeft||2)-1;
            if(proj.pierceLeft<=0) proj.alive=false;
          }
          hitSomething=true;
          spawnHitPtcl(proj.x,proj.y,proj.kind);
          if(e.hp<=0){
            e.alive=false; bigExplosion(esx+e.w/2,e.y+e.h/2);
            if(proj.owner==='p1') score1+=20*curLevel; else score2+=15*curLevel;
            updateHUD();
          }
        }
      });
      if(boss&&boss.alive&&proj.alive){
        const bsx=boss.x-worldX;
        if(proj.x<bsx+boss.w&&proj.x+proj.w>bsx&&proj.y<boss.y+boss.h&&proj.y+proj.h>boss.y){
          let dmg=proj.damage||1;
          if(proj.kind==='beam') dmg=Math.min(dmg,Math.ceil(boss.maxHp*0.08));
          boss.hp=Math.max(0,boss.hp-dmg);
          if(proj.kind!=='beam') proj.alive=false;
          spawnHitPtcl(proj.x,proj.y,proj.kind);
          updateHUD();
        }
      }
    } else {
      // Enemy shots vs players
      pls.forEach(pl=>{
        if(!proj.alive||pl.invincible>0) return;
        if(proj.x<pl.x+pl.w&&proj.x+proj.w>pl.x&&proj.y<pl.y+pl.h&&proj.y+proj.h>pl.y){
          if(pl.shielding&&pl.type==='princess'){
            proj.vx*=-1.05; proj.vy=-1.5; proj.owner='p1';
            spawnHitPtcl(proj.x,proj.y,'shield');
          } else {
            proj.alive=false; hitPlayer(pl,1);
            spawnHitPtcl(proj.x,proj.y,'fire');
          }
        }
      });
    }
  });
  projectiles=projectiles.filter(p=>p.alive);
}

function hitPlayer(pl,dmg){
  if(pl.invincible>0) return;
  pl.hp-=dmg; pl.invincible=75;
  spawnHitPtcl(pl.x+pl.w/2,pl.y+pl.h/2,'fire');
  if(pl.hp<=0){ pl.hp=0; pl.dead=true; pl.deadTimer=0; bigExplosion(pl.x+pl.w/2,pl.y+pl.h/2); }
  updateHUD();
}

// ── PARTICLES ────────────────────────────────────────
function spawnHitPtcl(x,y,kind){
  const c=kind==='shield'?['#88ccff','#fff','#4488ff']:kind==='beam'?RAINBOW_COLS:['#ff6600','#ff3300','#ffcc00'];
  for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col:c[Math.floor(Math.random()*c.length)],life:22+Math.random()*18,sz:3+Math.random()*4});}
}
function spawnSmoke(x,y,n=6){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.8,col:'#aaa',life:14+Math.random()*14,sz:4+Math.random()*5});}}
function bigExplosion(x,y){for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*8;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col:['#ff6600','#ff0000','#ffcc00','#ff8800','#ffffff'][Math.floor(Math.random()*5)],life:28+Math.random()*28,sz:5+Math.random()*8});}}
function updateParticles(){particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.vx*=0.94;p.life--;p.sz*=0.975;});particles=particles.filter(p=>p.life>0);}

// ── LAVA HAZARD UPDATE ───────────────────────────────
function updateLavaHazards(){
  const targets=[p1,p2].filter(p=>p&&!p.dead);
  if(!targets.length) return;
  sceneryItems.forEach(s=>{
    const sx=s.x-worldX;
    if(sx<-80||sx>W+80) return;
    if(s.type==='lavaStream'){
      const streamX=sx-8, streamW=28;
      targets.forEach(pl=>{
        if(pl.invincible>0) return;
        if(pl.x+pl.w>streamX&&pl.x<streamX+streamW&&pl.y+pl.h>=GROUND-14){
          hitPlayer(pl,1);
        }
      });
    }
    if(s.type==='lavaRiver'){
      const rw=s.rw||180;
      targets.forEach(pl=>{
        if(pl.invincible>0) return;
        if(pl.x+pl.w>sx&&pl.x<sx+rw&&pl.y+pl.h>=GROUND-10){
          hitPlayer(pl,2); // falling in lava hurts more
        }
      });
    }
    if(s.type==='lavaCreature'){
      // Periodically throw a lava blob toward nearest player
      s.spawnTimer=(s.spawnTimer||0)+1;
      const throwRate=110-curLevel*8;
      if(s.spawnTimer>=throwRate){
        s.spawnTimer=0;
        const near=targets.reduce((b,t)=>!b||Math.abs(t.x-sx)<Math.abs(b.x-sx)?t:b,null);
        if(near&&Math.abs(near.x-sx)<480){
          const dx=near.x-sx, dy=near.y-GROUND;
          const len=Math.sqrt(dx*dx+dy*dy)||1;
          projectiles.push({kind:'lavaBlob',owner:'enemy',
            x:sx+14,y:GROUND-28,vx:(dx/len)*5.5,vy:-9-Math.random()*2,
            w:16,h:16,alive:true,t:0});
        }
      }
    }
  });
}

// ── KNIGHT UPDATE ────────────────────────────────────
function initKnight(){
  const cfg=LEVELS[curLevel-1];
  const allyType=cfg.allyType||'blue_knight';
  const cage=walls.find(w=>w.isCage);
  const kx=cage ? cage.x - worldX + 20 : W - 320;
  // Color mapping per ally type
  const colorMap={blue_knight:'blue',red_knight:'red',green_knight:'green',elf_archer:'green',villager:'brown',royal_father:'gold'};
  const k={
    x:kx, y:GROUND-66, vx:0, state:'walking',
    animT:0, animF:0, facing:-1,
    allyType, id:curLevel,
    color:colorMap[allyType]||'blue',
    persistent:allyType!=='villager', // villagers stay behind, all others follow
    shootCool:Math.floor(Math.random()*40), meleeCool:0, swordSwing:0,
  };
  knight=k;
  allKnights.push(k);
}

function updateKnight(){
  allKnights.forEach((k,ki)=>{
    k.animT++; if(k.animT>9){k.animT=0;k.animF=(k.animF+1)%4;}
    if(!k.shootCool) k.shootCool=Math.floor(Math.random()*40);
    if(!k.meleeCool) k.meleeCool=0;
    if(!k.swordSwing) k.swordSwing=0;

    if(k.state==='riding'){
      if(k.id===1&&numPlayers===2&&p2&&!p2.dead){
        k.x=p2.x+(p2.facing<0?8:-12); k.y=p2.y-24; k.facing=p2.facing;
      } else if(p1&&!p1.dead){
        const slot=ki;
        const side=(slot%2===0)?-1:1;
        const depth=Math.floor(slot/2+1)*30;
        const targetX=p1.x+p1.w/2+side*depth-14;
        k.x+=(targetX-k.x)*0.09;
        k.y=GROUND-66;
        k.facing=(k.x<p1.x+p1.w/2)?1:-1;
      }
    } else {
      k.vx=-1.8; k.x+=k.vx; k.facing=-1; k.y=GROUND-66;
      if(k.id===1&&numPlayers===2&&p2&&!p2.dead){if(Math.abs(k.x-p2.x)<65)k.state='riding';}
      else if(p1&&!p1.dead){if(Math.abs(k.x-p1.x)<80)k.state='riding';}
    }

    // Villagers don't fight; royal_father just cheers
    if(k.allyType==='royal_father') return; // king cheers but doesn't fight

    // Elf archer only targets aerial enemies
    const elfOnly=k.allyType==='elf_archer';

    let nearEnemy=null, nearDist=999;
    enemies.forEach(e=>{
      if(!e.alive) return;
      const ex=e.worldX-worldX;
      const d=Math.abs(ex-k.x);
      const isAerial=e.type==='fire_imp'||e.type==='ice_shard'||e.type==='winged_lady';
      if(elfOnly&&!isAerial) return;
      if(d<nearDist){nearDist=d;nearEnemy=e;}
    });
    if(!elfOnly&&boss&&boss.alive){
      const bd=Math.abs((boss.x-worldX+boss.w/2)-k.x);
      if(bd<nearDist){nearDist=bd;nearEnemy=boss;}
    }

    if(nearEnemy){
      const tx2=nearEnemy.worldX!==undefined?(nearEnemy.worldX-worldX+nearEnemy.w/2):(nearEnemy.x-worldX+nearEnemy.w/2);
      const ty2=nearEnemy.y+nearEnemy.h/2;

      // Melee (knight types only, not elf)
      k.meleeCool++;
      const canMelee=k.allyType==='blue_knight'||k.allyType==='red_knight'||k.allyType==='green_knight';
      if(canMelee&&nearDist<58&&k.meleeCool>=60){
        k.meleeCool=0; k.swordSwing=12;
        k.facing=tx2>k.x?1:-1;
        if(nearEnemy===boss){
          // Knights can only tickle the boss — small chip damage
          boss.hp=Math.max(0,boss.hp-0.5);
          spawnHitPtcl(tx2,ty2,'shield'); updateHUD();
        } else {
          nearEnemy.hp--;
          spawnHitPtcl(tx2,nearEnemy.y+nearEnemy.h/2,'shield');
          if(nearEnemy.hp<=0){nearEnemy.alive=false;bigExplosion(tx2,nearEnemy.y+nearEnemy.h/2);score1+=20*curLevel;updateHUD();}
        }
      }

      // Ranged
      k.shootCool++;
      const shootRange=canMelee?280:350;
      if(nearDist>=55&&nearDist<shootRange&&k.shootCool>=90){
        k.shootCool=0;
        const dx=tx2-k.x, dy=ty2-(k.y+18);
        const len=Math.sqrt(dx*dx+dy*dy)||1;
        k.facing=dx>0?1:-1;
        const kind=k.allyType==='elf_archer'?'arrow':'knightArrow';
        projectiles.push({kind,owner:'p1',x:k.x+(k.facing>0?30:0),y:k.y+18,vx:(dx/len)*8,vy:(dy/len)*8,w:18,h:7,alive:true,t:0,damage:1,knightShot:true});
      }
    } else {k.shootCool++;k.meleeCool++;}
    if(k.swordSwing>0)k.swordSwing--;
  });
}
// ── HUD ──────────────────────────────────────────────
function heartsStr(n,max){let s='';for(let i=0;i<max;i++) s+=i<n?'❤️':'🖤';return s;}
function updateHUD(){
  if(p1){
    document.getElementById('hp1bar').style.width=(Math.max(0,p1.hp/p1.maxHp)*100)+'%';
    document.getElementById('flybar').style.width=(p1.flyFuel/FLY_MAX*100)+'%';
    document.getElementById('lives1El').textContent=heartsStr(lives1,LIVES_START);
  }
  const cbPct=chargeBeam.cooldown>0?(1-chargeBeam.cooldown/chargeBeam.cooldownMax)*0.2:chargeBeam.level/chargeBeam.maxLevel;
  const cbEl=document.getElementById('chargebar');
  cbEl.style.width=(cbPct*100)+'%';
  cbEl.style.background=chargeBeam.cooldown>0?'linear-gradient(90deg,#666,#888)':'linear-gradient(90deg,#ffe066,#fff)';
  document.getElementById('scoreEl').textContent=score1+(numPlayers===2?'+'+score2:'');
  document.getElementById('lvlEl').textContent=curLevel+'/5';
  if(p2){
    document.getElementById('hp2bar').style.width=(Math.max(0,p2.hp/p2.maxHp)*100)+'%';
    document.getElementById('lives2El').textContent=heartsStr(lives2,LIVES_START);
  }
}

// ── DRAW BACKGROUND ──────────────────────────────────
function drawBG(){
  const cfg=LEVELS[curLevel-1];
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,cfg.sky[0]); g.addColorStop(1,cfg.sky[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Far clouds
  ctx.fillStyle='rgba(255,255,255,0.16)';
  for(let i=0;i<5;i++){const cx=((i*218-worldX*0.12+gFrame*0.2)%W+W)%W,cy=42+i*26;drawCloud(cx,cy,56,18);}
  // Near clouds
  ctx.fillStyle='rgba(255,255,255,0.26)';
  for(let i=0;i<3;i++){const cx=((i*330+100-worldX*0.22+gFrame*0.4)%W+W)%W,cy=68+i*36;drawCloud(cx,cy,80,26);}

  // Level-specific BG mountains
  drawLevelBGMountains(cfg);

  // Ground — cartoon gradient
  const gg=ctx.createLinearGradient(0,GROUND,0,H);
  gg.addColorStop(0,cfg.groundTop);gg.addColorStop(0.1,cfg.ground);gg.addColorStop(1,cfg.ground);
  ctx.fillStyle=gg;ctx.fillRect(0,GROUND,W,H-GROUND);
  const gd=cfg.groundDetail||'grass';
  if(gd==='grass'){
    ctx.fillStyle=cfg.groundTop;
    for(let gx=(-(worldX*0.3)%44+44)%44;gx<W+22;gx+=44){
      ctx.beginPath();ctx.ellipse(gx,GROUND,22,8,0,0,Math.PI,true);ctx.fill();
    }
  } else if(gd==='ice'){
    ctx.fillStyle='rgba(160,220,255,0.45)';ctx.fillRect(0,GROUND,W,8);
  } else if(gd==='scorched'){
    ctx.fillStyle='#3a1000';
    for(let gx=(-(worldX*0.25)%50+50)%50;gx<W+10;gx+=50){
      ctx.beginPath();ctx.moveTo(gx,GROUND);ctx.lineTo(gx+8,GROUND-7);ctx.lineTo(gx+16,GROUND);ctx.fill();
    }
  } else if(gd==='mushroom'){
    ctx.fillStyle='#4a2a08';
    for(let gx=(-(worldX*0.28)%48+48)%48;gx<W+20;gx+=48){
      ctx.beginPath();ctx.ellipse(gx,GROUND,18,7,0,0,Math.PI,true);ctx.fill();
    }
  } else {
    ctx.fillStyle=cfg.groundTop;ctx.fillRect(0,GROUND,W,6);
  }

  // Scenery items
  drawSceneryItems(cfg);
}

function drawCloud(x,y,rw,rh){
  ctx.beginPath();ctx.ellipse(x,y,rw,rh,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+rw*0.5,y-rh*0.45,rw*0.58,rh*0.65,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x-rw*0.42,y-rh*0.28,rw*0.52,rh*0.58,0,0,Math.PI*2);ctx.fill();
}

function drawLevelBGMountains(cfg){
  if(curLevel===1){
    // Rolling green hills
    ctx.fillStyle='rgba(60,120,40,0.25)';
    for(let i=0;i<6;i++){
      const hx=((i*180-worldX*0.28)%W+W)%W;
      ctx.beginPath();ctx.ellipse(hx+80,GROUND,120,80,0,0,Math.PI);ctx.fill();
    }
  } else if(curLevel===2){
    // Tall dark forest trees
    ctx.fillStyle='rgba(18,10,40,0.5)';
    for(let i=0;i<8;i++){
      const tx=((i*120-worldX*0.3)%W+W)%W;
      ctx.fillRect(tx+18,GROUND-190,18,190);
      ctx.beginPath();ctx.moveTo(tx,GROUND-180);ctx.lineTo(tx+27,GROUND-290);ctx.lineTo(tx+54,GROUND-180);ctx.fill();
    }
  } else if(curLevel===3){
    // Volcano silhouettes
    ctx.fillStyle='rgba(80,10,0,0.4)';
    for(let i=0;i<4;i++){
      const vx=((i*250-worldX*0.25)%W+W)%W;
      ctx.beginPath();ctx.moveTo(vx,GROUND);ctx.lineTo(vx+80,GROUND-240);ctx.lineTo(vx+160,GROUND);ctx.fill();
    }
    // Lava glow
    ctx.fillStyle='rgba(255,80,0,0.12)';
    for(let i=0;i<4;i++){
      const vx=((i*250-worldX*0.25)%W+W)%W;
      ctx.beginPath();ctx.ellipse(vx+80,GROUND-240,18,14,0,0,Math.PI*2);ctx.fill();
    }
  } else if(curLevel===4){
    // Icy stalactite BG
    ctx.fillStyle='rgba(50,100,180,0.22)';
    for(let i=0;i<10;i++){
      const ix=((i*90-worldX*0.2)%W+W)%W;
      ctx.beginPath();ctx.moveTo(ix,0);ctx.lineTo(ix+18,0);ctx.lineTo(ix+9,60+Math.sin(i)*30);ctx.fill();
    }
    // Ice floor sheen
    ctx.fillStyle='rgba(100,180,255,0.12)';ctx.fillRect(0,GROUND,W,10);
  } else {
    // Fortress battlements
    ctx.fillStyle='rgba(30,0,50,0.55)';
    for(let i=0;i<W;i+=48){
      ctx.fillRect(i,0,28,160);
      ctx.fillRect(i+28,0,20,120);
    }
    // Torch glows
    for(let i=0;i<5;i++){
      const tx=((i*200-worldX*0.28)%W+W)%W;
      ctx.fillStyle=`rgba(255,120,0,${0.15+Math.sin(gFrame*0.1+i)*0.08})`;
      ctx.beginPath();ctx.ellipse(tx,GROUND-140,24,40,0,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawSceneryItems(cfg){
  sceneryItems.forEach(s=>{
    const sx=s.x-worldX;
    if(sx<-120||sx>W+120) return;
    const t=s.type, sd=s.seed;
    switch(t){
      case 'flowers':
        // Colorful flower patch
        ['#ff6080','#ffdd44','#ff88cc','#ff4488'].forEach((col,i)=>{
          ctx.fillStyle=col;
          ctx.beginPath();ctx.ellipse(sx+i*12,GROUND-4,7,5,0,0,Math.PI*2);ctx.fill();
        });
        ctx.fillStyle='#4a8a20';for(let i=0;i<4;i++)ctx.fillRect(sx+i*12+2,GROUND-8,3,10);
        break;
      case 'pond':
        ctx.fillStyle='rgba(40,120,200,0.55)';
        ctx.beginPath();ctx.ellipse(sx+40,GROUND+4,46,10,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(160,220,255,0.4)';
        ctx.beginPath();ctx.ellipse(sx+32,GROUND+2,22,5,0,0,Math.PI*2);ctx.fill();
        break;
      case 'hay':
        ctx.fillStyle='#c8a040';ctx.beginPath();ctx.ellipse(sx+18,GROUND-14,20,14,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#a88020';ctx.fillRect(sx+6,GROUND-14,24,14);
        break;
      case 'treeline':
        ctx.fillStyle='#3a7020';ctx.fillRect(sx+12,GROUND-80,14,80);
        ctx.fillStyle='#4a8a28';ctx.beginPath();ctx.ellipse(sx+19,GROUND-90,26,42,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#5ca030';ctx.beginPath();ctx.ellipse(sx+19,GROUND-110,20,32,0,0,Math.PI*2);ctx.fill();
        break;
      case 'hill':
        ctx.fillStyle='rgba(70,130,50,0.35)';
        ctx.beginPath();ctx.ellipse(sx+50,GROUND,75,45,0,0,Math.PI);ctx.fill();
        break;
      case 'mushroom':
        ctx.fillStyle='#cc2020';ctx.beginPath();ctx.ellipse(sx+18,GROUND-40,24,28,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';for(let i=0;i<4;i++)ctx.beginPath(),ctx.ellipse(sx+6+i*10,GROUND-36,5,5,0,0,Math.PI*2),ctx.fill();
        ctx.fillStyle='#8b4513';ctx.fillRect(sx+14,GROUND-16,8,16);
        break;
      case 'darkTree':
        ctx.fillStyle='#1a0a30';ctx.fillRect(sx+8,GROUND-130,12,130);
        ctx.fillStyle='#220a3a';
        ctx.beginPath();ctx.moveTo(sx,GROUND-110);ctx.lineTo(sx+14,GROUND-200);ctx.lineTo(sx+28,GROUND-110);ctx.fill();
        ctx.beginPath();ctx.moveTo(sx+3,GROUND-140);ctx.lineTo(sx+14,GROUND-220);ctx.lineTo(sx+25,GROUND-140);ctx.fill();
        break;
      case 'glowBug':
        ctx.fillStyle=`rgba(100,255,100,${0.4+Math.sin(gFrame*0.08+sd*10)*0.3})`;
        ctx.beginPath();ctx.ellipse(sx+Math.sin(gFrame*0.06+sd*5)*20,GROUND-60-Math.cos(gFrame*0.05+sd*4)*30,5,5,0,0,Math.PI*2);ctx.fill();
        break;
      case 'fog':
        ctx.fillStyle=`rgba(100,80,140,${0.08+Math.sin(gFrame*0.03+sd*8)*0.04})`;
        ctx.fillRect(sx-30,GROUND-50,120,50);
        break;
      case 'lava':
        ctx.fillStyle='rgba(255,60,0,0.55)';
        ctx.beginPath();ctx.ellipse(sx+30,GROUND+4,38,8,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=`rgba(255,160,0,${0.5+Math.sin(gFrame*0.12+sd*6)*0.2})`;
        ctx.beginPath();ctx.ellipse(sx+24,GROUND+2,20,5,0,0,Math.PI*2);ctx.fill();
        break;
      case 'volcano':
        ctx.fillStyle='#4a1400';
        ctx.beginPath();ctx.moveTo(sx,GROUND);ctx.lineTo(sx+40,GROUND-120);ctx.lineTo(sx+80,GROUND);ctx.fill();
        ctx.fillStyle='rgba(255,80,0,0.7)';
        ctx.beginPath();ctx.ellipse(sx+40,GROUND-120,10,8,0,0,Math.PI*2);ctx.fill();
        break;
      case 'ashCloud':
        ctx.fillStyle=`rgba(80,60,60,${0.18+Math.sin(gFrame*0.04+sd*9)*0.06})`;
        ctx.beginPath();ctx.ellipse(sx+40,GROUND-170,55,25,0,0,Math.PI*2);ctx.fill();
        break;
      case 'rockSpire':
        ctx.fillStyle='#5a4030';
        ctx.beginPath();ctx.moveTo(sx+16,GROUND-100);ctx.lineTo(sx+4,GROUND);ctx.lineTo(sx+28,GROUND);ctx.fill();
        ctx.fillStyle='#7a5840';ctx.fillRect(sx+8,GROUND-60,10,60);
        break;
      case 'icicle':
        ctx.fillStyle='rgba(160,220,255,0.8)';
        for(let i=0;i<3;i++){
          const ix=sx+i*22;
          ctx.beginPath();ctx.moveTo(ix+5,0);ctx.lineTo(ix,50+sd*30+i*15);ctx.lineTo(ix+10,50+sd*30+i*15);ctx.fill();
        }
        break;
      case 'icePillar':
        ctx.fillStyle='rgba(100,160,220,0.6)';ctx.fillRect(sx+8,GROUND-140,18,140);
        ctx.fillStyle='rgba(180,230,255,0.5)';ctx.fillRect(sx+10,GROUND-140,6,140);
        break;
      case 'frozenPond':
        ctx.fillStyle='rgba(140,200,255,0.5)';
        ctx.beginPath();ctx.ellipse(sx+40,GROUND+3,48,8,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(220,240,255,0.4)';
        ctx.beginPath();ctx.ellipse(sx+30,GROUND+1,22,4,0,0,Math.PI*2);ctx.fill();
        break;
      case 'snowfall':
        for(let i=0;i<5;i++){
          ctx.fillStyle='rgba(255,255,255,0.7)';
          const fy=((gFrame*0.6+sd*100+i*40)%H);
          ctx.beginPath();ctx.ellipse(sx+i*22,fy,3,3,0,0,Math.PI*2);ctx.fill();
        }
        break;
      case 'darkPillar':
        ctx.fillStyle='#1a0830';ctx.fillRect(sx+4,GROUND-180,24,180);
        ctx.fillStyle='#2a0840';ctx.fillRect(sx,GROUND-188,32,14);
        ctx.fillStyle='#1a0828';ctx.fillRect(sx+2,GROUND-188,28,8);
        break;
      case 'castle':{
        const th=s.theme||'meadow';
        const cw=320, ch=260;
        const csx=sx-cw/2+40;
        const csy=GROUND-ch;

        // Stone palette per theme
        const wallC =th==='shadow'?'#1c0830':th==='volcanic'?'#4a1800':th==='ice'?'#1a3c6a':th==='dark'?'#2a1408':'#7a6a58';
        const wallL =th==='shadow'?'#2e1040':th==='volcanic'?'#6a2600':th==='ice'?'#2a5080':th==='dark'?'#3a2010':'#9a8a76';
        const wallD =th==='shadow'?'#0e0018':th==='volcanic'?'#2a0c00':th==='ice'?'#0a1830':th==='dark'?'#180a04':'#5a4a3a';
        const roofC =th==='shadow'?'#3a005a':th==='volcanic'?'#7a1800':th==='ice'?'#3a78a0':th==='dark'?'#3a1400':'#7a2010';
        const roofL =th==='shadow'?'#6600aa':th==='volcanic'?'#aa2800':th==='ice'?'#5aaacc':th==='dark'?'#6a2800':'#aa3820';
        const winC  =th==='shadow'?'#cc44ff':th==='volcanic'?'#ff6600':th==='ice'?'#88eeff':th==='dark'?'#ffcc44':'#88ccff';
        const flagC =th==='shadow'?'#cc00cc':th==='volcanic'?'#ff2200':th==='ice'?'#00ccff':th==='dark'?'#ff8800':'#cc2020';
        const mossC =th==='ice'?'rgba(140,200,255,0.15)':th==='shadow'?'rgba(100,0,100,0.12)':'rgba(60,100,40,0.18)';

        ctx.save();
        ctx.translate(csx, csy);

        // ── Ground shadow / moat hint ──
        ctx.fillStyle='rgba(0,0,0,0.22)';
        ctx.beginPath(); ctx.ellipse(cw/2, ch+4, cw*0.48, 14, 0, 0, Math.PI*2); ctx.fill();
        if(th==='meadow'||th==='dark'||th==='ice'){
          // Moat reflection shimmer
          const moatCol=th==='ice'?'rgba(100,180,255,0.3)':'rgba(40,100,180,0.28)';
          ctx.fillStyle=moatCol;
          ctx.beginPath(); ctx.ellipse(cw/2,ch+2,cw*0.45,8,0,0,Math.PI*2); ctx.fill();
        }

        // Helper to draw a stone-coursed rectangle
        function stoneRect(x,y,w,h,base,light,dark2){
          // Main fill with subtle gradient
          const gr=ctx.createLinearGradient(x,y,x+w,y+h*0.5);
          gr.addColorStop(0,light); gr.addColorStop(0.4,base); gr.addColorStop(1,dark2);
          ctx.fillStyle=gr; ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=2;
          ctx.beginPath(); ctx.roundRect(x,y,w,h,3); ctx.fill(); ctx.stroke();
          // Stone courses
          ctx.strokeStyle='rgba(0,0,0,0.22)'; ctx.lineWidth=1;
          for(let ry=18;ry<h;ry+=18){
            ctx.beginPath(); ctx.moveTo(x+4,y+ry); ctx.lineTo(x+w-4,y+ry); ctx.stroke();
          }
          // Individual stone blocks per row
          for(let ri=0;ri<Math.floor(h/18);ri++){
            const offset=(ri%2)*11;
            ctx.fillStyle='rgba(0,0,0,0.07)';
            for(let rx=x+2+offset;rx<x+w-4;rx+=22)
              ctx.fillRect(rx,y+ri*18+1,20,15);
          }
          // Moss/weathering overlay
          ctx.fillStyle=mossC;
          ctx.beginPath(); ctx.roundRect(x,y,w,h,3); ctx.fill();
          // Side depth shadow
          ctx.fillStyle='rgba(0,0,0,0.14)'; ctx.fillRect(x,y,5,h);
          ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(x+w-4,y,4,h);
        }

        // Helper for merlon row
        function merlons(x,y,totalW,mW,mH){
          const count=Math.floor(totalW/(mW*2));
          const spacing=totalW/count;
          for(let i=0;i<count;i++){
            const mx=x+i*spacing;
            ctx.fillStyle=wallL; ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.roundRect(mx,y-mH,mW-2,mH,2); ctx.fill(); ctx.stroke();
            ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(mx,y-mH,4,mH);
          }
        }

        // Helper: cone roof
        function coneRoof(cx2,tipY,baseY,bW,col,col2){
          const gr2=ctx.createLinearGradient(cx2-bW/2,baseY,cx2+bW/2,tipY);
          gr2.addColorStop(0,col); gr2.addColorStop(1,col2);
          ctx.fillStyle=gr2; ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2;
          ctx.beginPath(); ctx.moveTo(cx2,tipY); ctx.lineTo(cx2-bW/2-4,baseY); ctx.lineTo(cx2+bW/2+4,baseY); ctx.closePath();
          ctx.fill(); ctx.stroke();
          // Roof tiles lines
          ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1;
          for(let ti=1;ti<6;ti++){
            const frac=ti/6, ry2=tipY+(baseY-tipY)*frac;
            const rw=(bW+8)*frac;
            ctx.beginPath(); ctx.moveTo(cx2-rw/2,ry2); ctx.lineTo(cx2+rw/2,ry2); ctx.stroke();
          }
          // Highlight
          ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.moveTo(cx2,tipY); ctx.lineTo(cx2-bW*0.12,baseY); ctx.stroke();
        }

        // Helper: arched window
        function archWindow(wx2,wy2,ww,wh){
          const r=ww/2;
          ctx.fillStyle='rgba(0,0,0,0.8)';
          ctx.beginPath(); ctx.moveTo(wx2,wy2); ctx.lineTo(wx2,wy2+wh-r); ctx.arc(wx2+r,wy2+wh-r,r,Math.PI,0,true); ctx.lineTo(wx2+ww,wy2); ctx.closePath(); ctx.fill();
          ctx.fillStyle=winC; ctx.globalAlpha=0.5;
          ctx.beginPath(); ctx.moveTo(wx2+3,wy2+2); ctx.lineTo(wx2+3,wy2+wh-r); ctx.arc(wx2+r,wy2+wh-r,r-3,Math.PI,0,true); ctx.lineTo(wx2+ww-3,wy2+2); ctx.closePath(); ctx.fill();
          ctx.globalAlpha=1;
          // Glazing bars
          ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.moveTo(wx2+r,wy2); ctx.lineTo(wx2+r,wy2+wh); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(wx2,wy2+wh*0.4); ctx.lineTo(wx2+ww,wy2+wh*0.4); ctx.stroke();
        }

        // ── LEFT TOWER ──
        const ltw=62, lth=ch*0.72, ltx=0, lty=ch-lth;
        stoneRect(ltx,lty,ltw,lth,wallC,wallL,wallD);
        merlons(ltx,lty,ltw,14,20);
        coneRoof(ltx+ltw/2,lty-65,lty,ltw,roofC,roofL);
        archWindow(ltx+ltw*0.2,lty+lth*0.2,18,26);
        archWindow(ltx+ltw*0.2,lty+lth*0.5,18,26);
        // Flagpole
        ctx.strokeStyle=wallD; ctx.lineWidth=3; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(ltx+ltw/2,lty-65); ctx.lineTo(ltx+ltw/2,lty-95); ctx.stroke();
        ctx.fillStyle=flagC;
        ctx.beginPath(); ctx.moveTo(ltx+ltw/2,lty-95); ctx.lineTo(ltx+ltw/2+22,lty-84); ctx.lineTo(ltx+ltw/2,lty-74); ctx.fill();

        // ── RIGHT TOWER ──
        const rtx=cw-ltw;
        stoneRect(rtx,lty,ltw,lth,wallC,wallL,wallD);
        merlons(rtx,lty,ltw,14,20);
        coneRoof(rtx+ltw/2,lty-65,lty,ltw,roofC,roofL);
        archWindow(rtx+ltw*0.2,lty+lth*0.2,18,26);
        archWindow(rtx+ltw*0.2,lty+lth*0.5,18,26);
        ctx.strokeStyle=wallD; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(rtx+ltw/2,lty-65); ctx.lineTo(rtx+ltw/2,lty-95); ctx.stroke();
        ctx.fillStyle=flagC;
        ctx.beginPath(); ctx.moveTo(rtx+ltw/2,lty-95); ctx.lineTo(rtx+ltw/2+22,lty-84); ctx.lineTo(rtx+ltw/2,lty-74); ctx.fill();

        // ── CURTAIN WALL ──
        const cwx=ltw, cwy=ch*0.6, cww=cw-ltw*2, cwh=ch-cwy;
        stoneRect(cwx,cwy,cww,cwh,wallC,wallL,wallD);
        merlons(cwx,cwy,cww,12,16);

        // ── MAIN KEEP (taller, central) ──
        const mkw=cw*0.34, mkh=ch*0.92, mkx=(cw-mkw)/2, mky=ch-mkh;
        stoneRect(mkx,mky,mkw,mkh,wallC,wallL,wallD);
        merlons(mkx,mky,mkw,14,22);
        coneRoof(mkx+mkw/2,mky-78,mky,mkw,roofC,roofL);
        // Keep windows
        for(let wi=0;wi<3;wi++) archWindow(mkx+mkw*0.2,mky+mkh*0.12+wi*mkh*0.22,mkw*0.28,mkh*0.17);
        for(let wi=0;wi<3;wi++) archWindow(mkx+mkw*0.54,mky+mkh*0.12+wi*mkh*0.22,mkw*0.28,mkh*0.17);
        // Keep flag
        ctx.strokeStyle=wallD; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(mkx+mkw/2,mky-78); ctx.lineTo(mkx+mkw/2,mky-112); ctx.stroke();
        ctx.fillStyle=flagC;
        ctx.beginPath(); ctx.moveTo(mkx+mkw/2,mky-112); ctx.lineTo(mkx+mkw/2+28,mky-98); ctx.lineTo(mkx+mkw/2,mky-84); ctx.fill();

        // ── GATEHOUSE (front, lower) ──
        const ghw=cw*0.26, ghh=ch*0.5, ghx=(cw-ghw)/2, ghy=ch-ghh;
        stoneRect(ghx,ghy,ghw,ghh,wallL,wallC,wallD);
        merlons(ghx,ghy,ghw,10,14);
        // Portcullis arch
        const archW=ghw*0.55, archH=ghh*0.72;
        const archX=ghx+(ghw-archW)/2, archY=ghy+(ghh-archH);
        ctx.fillStyle='rgba(0,0,0,0.85)';
        ctx.beginPath();
        ctx.moveTo(archX, ch);
        ctx.lineTo(archX, archY+archH*0.4);
        ctx.arc(archX+archW/2, archY+archH*0.4, archW/2, Math.PI, 0, false);
        ctx.lineTo(archX+archW, ch);
        ctx.closePath(); ctx.fill();
        // Portcullis grid
        ctx.strokeStyle='#555'; ctx.lineWidth=3; ctx.lineCap='butt';
        const bars=4;
        for(let b=0;b<=bars;b++){
          ctx.beginPath(); ctx.moveTo(archX+b*(archW/bars),archY+archH*0.3); ctx.lineTo(archX+b*(archW/bars),ch); ctx.stroke();
        }
        for(let b=0;b<4;b++){
          ctx.beginPath(); ctx.moveTo(archX,archY+archH*0.3+b*(ch-archY-archH*0.3)/3.5); ctx.lineTo(archX+archW,archY+archH*0.3+b*(ch-archY-archH*0.3)/3.5); ctx.stroke();
        }
        // Portcullis spikes
        ctx.fillStyle='#777';
        for(let b=0;b<=bars;b++) ctx.beginPath(),ctx.moveTo(archX+b*(archW/bars)-4,ch),ctx.lineTo(archX+b*(archW/bars)+4,ch),ctx.lineTo(archX+b*(archW/bars),ch+12),ctx.fill();
        // Drawbridge hint
        ctx.fillStyle='#5a3a10'; ctx.strokeStyle='#3a2008'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.roundRect(archX+2,ch-4,archW-4,8,2); ctx.fill(); ctx.stroke();
        for(let p=0;p<4;p++){ ctx.strokeStyle='#3a2008'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(archX+4+p*(archW-8)/3,ch-4); ctx.lineTo(archX+4+p*(archW-8)/3,ch+4); ctx.stroke(); }

        ctx.restore();
        break;
      }
      case 'gargoyle':      case 'gargoyle':
        ctx.fillStyle='#2a1040';ctx.fillRect(sx+8,GROUND-80,20,80);
        ctx.fillStyle='#3a1850';ctx.beginPath();ctx.ellipse(sx+18,GROUND-90,16,16,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ff2200';ctx.fillRect(sx+13,GROUND-94,4,4);ctx.fillRect(sx+21,GROUND-94,4,4);
        break;
      case 'boneGround':
        ctx.fillStyle='rgba(180,160,120,0.4)';
        ctx.fillRect(sx,GROUND+2,50,5);
        ctx.fillStyle='rgba(200,180,140,0.5)';
        for(let i=0;i<3;i++)ctx.beginPath(),ctx.ellipse(sx+8+i*16,GROUND+4,5,4,0,0,Math.PI*2),ctx.fill();
        break;
      case 'torchLight':
        ctx.fillStyle=`rgba(255,120,0,${0.12+Math.sin(gFrame*0.12+sd*5)*0.08})`;
        ctx.beginPath();ctx.ellipse(sx+6,GROUND-80,18,50,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8b4513';ctx.fillRect(sx+3,GROUND-100,6,100);
        ctx.fillStyle='#ff8800';ctx.beginPath();ctx.ellipse(sx+6,GROUND-102,6,9,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffee00';ctx.beginPath();ctx.ellipse(sx+6,GROUND-106,3,5,0,0,Math.PI*2);ctx.fill();
        break;
      case 'lavaRiver':{
        const rw=s.rw||180;
        // Glowing lava fill
        ctx.fillStyle=`rgba(255,50,0,0.88)`;ctx.fillRect(sx,GROUND-6,rw,H-GROUND+6);
        ctx.fillStyle=`rgba(255,160,0,${0.55+Math.sin(gFrame*0.08+sd*4)*0.2})`;
        ctx.fillRect(sx,GROUND-4,rw,8);
        // Lava bubbles
        for(let b=0;b<4;b++){
          const bx=sx+20+b*40, phs=(gFrame*0.06+b*1.8+sd*5);
          const by2=GROUND-4+Math.sin(phs)*3;
          ctx.fillStyle=`rgba(255,220,0,${0.5+Math.sin(phs)*0.3})`;
          ctx.beginPath();ctx.ellipse(bx,by2,7+Math.sin(phs+1)*3,5,0,0,Math.PI*2);ctx.fill();
        }
        // Rope (2 lines above bridge)
        ctx.strokeStyle='#8b5a1a';ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(sx-4,GROUND-28);ctx.lineTo(sx+rw+4,GROUND-28);ctx.stroke();
        ctx.beginPath();ctx.moveTo(sx-4,GROUND-18);ctx.lineTo(sx+rw+4,GROUND-18);ctx.stroke();
        // Vertical rope hangers
        for(let h=0;h<=5;h++){const hx=sx+h*(rw/5);ctx.beginPath();ctx.moveTo(hx,GROUND-28);ctx.lineTo(hx,GROUND-10);ctx.stroke();}
        ctx.lineWidth=1;
        // Planks (drawn over rope)
        ctx.fillStyle='#8b5a14';
        for(let p=0;p<5;p++){ctx.fillRect(sx+8+p*36,GROUND-14,32,10);ctx.fillStyle='#a06a20';ctx.fillRect(sx+10+p*36,GROUND-12,28,4);ctx.fillStyle='#8b5a14';}
        break;
      }
      case 'lavaCreature':{
        // Squat lava creature sitting at river edge, flinging blobs
        const lct=(gFrame*0.05+sd*8);
        ctx.fillStyle=`rgba(255,80,0,0.9)`;
        ctx.beginPath();ctx.ellipse(sx+14,GROUND-16,16,14,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ff2200';ctx.fillRect(sx+2,GROUND-20,24,12);
        ctx.fillStyle='#ffcc00';ctx.fillRect(sx+6,GROUND-22,5,5);ctx.fillRect(sx+16,GROUND-22,5,5);
        // Arm raised when about to throw
        ctx.fillStyle='rgba(255,80,0,0.9)';
        const armUp=Math.sin(lct)*10;
        ctx.fillRect(sx+22,GROUND-24+armUp,8,5);
        if(Math.sin(lct)>0.7){
          ctx.fillStyle='rgba(255,180,0,0.9)';ctx.beginPath();ctx.ellipse(sx+30,GROUND-24,5,5,0,0,Math.PI*2);ctx.fill();
        }
        break;
      }
      case 'lavaStream':{
        // A narrow river of lava flowing across the path
        const flowAnim=(gFrame*0.04+(s.phase||0));
        const streamH=10+Math.sin(flowAnim)*2;
        ctx.fillStyle=`rgba(255,60,0,0.82)`;
        ctx.fillRect(sx-8,GROUND-streamH,28,streamH);
        ctx.fillStyle=`rgba(255,180,0,${0.55+Math.sin(flowAnim*1.3)*0.2})`;
        ctx.fillRect(sx-6,GROUND-streamH+2,24,streamH-4);
        // Shimmer
        ctx.fillStyle=`rgba(255,255,100,${0.2+Math.sin(flowAnim*2)*0.15})`;
        ctx.fillRect(sx-4,GROUND-streamH+3,16,3);
        break;
      }
    }
  });
}

// ── DRAW WALLS & PLATFORMS ────────────────────────────
function drawWallsAndPlatforms(){
  const cfg=LEVELS[curLevel-1];
  platforms.forEach(pl=>{
    const sx=pl.x-worldX;
    if(sx<-pl.w||sx>W+10) return;
    if(pl.isBridge){
      // Wooden plank — skip, drawn by lavaRiver scenery handler
      return;
    }
    if(pl.isCastleFloor){
      // Stone floor with interior lighting
      const fl=ctx.createLinearGradient(sx,pl.y,sx+pl.w,pl.y+pl.h);
      fl.addColorStop(0,'#9a8a76');fl.addColorStop(0.5,'#7a6a58');fl.addColorStop(1,'#9a8a76');
      ctx.fillStyle=fl;ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(sx,pl.y,pl.w,pl.h,2);ctx.fill();ctx.stroke();
      // Stone tile lines
      ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1;
      for(let tx2=sx+20;tx2<sx+pl.w;tx2+=20){ctx.beginPath();ctx.moveTo(tx2,pl.y);ctx.lineTo(tx2,pl.y+pl.h);ctx.stroke();}
    } else {
      cRR(sx,pl.y,pl.w,pl.h,4,cfg.platformColor,cfg.wallColor,2);
      ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fillRect(sx+4,pl.y+2,pl.w-8,3);
    }
  });
  walls.forEach(wl=>{
    const sx=wl.x-worldX;
    if(sx<-wl.w||sx>W+10) return;
    if(wl.isCage){ drawKnightCage(sx,wl.y,wl.w,wl.h); return; }
    ctx.fillStyle=cfg.wallColor; ctx.fillRect(sx,wl.y,wl.w,wl.h);
    ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fillRect(sx,wl.y,3,wl.h);
    ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.fillRect(sx,wl.y,wl.w,5);
    for(let ty=wl.y+10;ty<wl.y+wl.h;ty+=16)
      for(let tx=sx+3;tx<sx+wl.w-3;tx+=10){
        ctx.fillStyle='rgba(0,0,0,0.07)'; ctx.fillRect(tx,ty,8,12);
      }
  });
}

function drawKnightCage(sx,sy,sw,sh){
  const cfg2=LEVELS[curLevel-1];
  const th2=cfg2.castleTheme||'meadow';
  const wallC=th2==='shadow'?'#1a0028':th2==='volcanic'?'#4a1800':th2==='ice'?'#1a3c6a':th2==='dark'?'#2a1408':'#6a5a48';
  const wallC2=th2==='shadow'?'#2a0040':th2==='volcanic'?'#6a2800':th2==='ice'?'#2a5080':th2==='dark'?'#3a2010':'#8a7a62';
  const roofC=th2==='shadow'?'#440066':th2==='volcanic'?'#8c2000':th2==='ice'?'#4488aa':th2==='dark'?'#4a1a00':'#883318';

  const groundY = sy+sh-60; // = GROUND in absolute coords
  const towerH = sh-60;     // visible tower height above ground

  // ── Tower body ──
  ctx.fillStyle=wallC; ctx.strokeStyle='#111'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.roundRect(sx, sy, sw, towerH, 4); ctx.fill(); ctx.stroke();

  // Stone rows
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1;
  for(let ry=16; ry<towerH; ry+=18){
    ctx.beginPath(); ctx.moveTo(sx+3, sy+ry); ctx.lineTo(sx+sw-3, sy+ry); ctx.stroke();
  }
  // Alternating stone offsets
  for(let ry=16; ry<towerH; ry+=36){
    ctx.fillStyle='rgba(0,0,0,0.06)';
    for(let rx=sx+2; rx<sx+sw-2; rx+=22) ctx.fillRect(rx, sy+ry, 18, 16);
  }
  // Side shading
  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(sx,sy,6,towerH);
  ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(sx+sw-5,sy,5,towerH);

  // ── Crenellations (battlements) at top ──
  const merlonW=sw/5, merlonH=22;
  for(let bi=0;bi<5;bi++){
    if(bi%2===0){
      ctx.fillStyle=wallC2; ctx.strokeStyle='#111'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(sx+bi*merlonW, sy-merlonH, merlonW-3, merlonH, 3);
      ctx.fill(); ctx.stroke();
    }
  }

  // ── Conical roof ──
  ctx.fillStyle=roofC; ctx.strokeStyle='#111'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(sx+sw/2, sy-merlonH-52);
  ctx.lineTo(sx-4, sy-merlonH+2);
  ctx.lineTo(sx+sw+4, sy-merlonH+2);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Roof highlight stripe
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(sx+sw/2, sy-merlonH-52);
  ctx.lineTo(sx+sw*0.38, sy-merlonH+2);
  ctx.stroke();

  // ── Arrow slit windows ──
  for(let wi=1;wi<=3;wi++){
    const wy=sy+towerH*0.18*wi;
    ctx.fillStyle='#0a0a10';
    ctx.beginPath();
    ctx.roundRect(sx+sw/2-5, wy, 10, 20, 2);
    ctx.fill();
    // Cross-slit
    ctx.fillRect(sx+sw/2-8, wy+8, 16, 5);
  }

  // ── Iron-bar window at bottom (prison cell) ──
  const barX=sx+8, barY=groundY-90, barW=sw-16, barH=62;
  ctx.fillStyle='#0a0a10';
  ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.fill();
  ctx.strokeStyle='#111'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.stroke();
  // Prison bars
  ctx.strokeStyle='#666'; ctx.lineWidth=4; ctx.lineCap='round';
  for(let b=0;b<5;b++){
    ctx.beginPath();
    ctx.moveTo(barX+4+b*(barW-8)/4, barY+2);
    ctx.lineTo(barX+4+b*(barW-8)/4, barY+barH-2);
    ctx.stroke();
  }
  // Horizontal bar
  ctx.strokeStyle='#777'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(barX+2,barY+barH/2); ctx.lineTo(barX+barW-2,barY+barH/2); ctx.stroke();

  // ── Prisoner character standing at ground floor ──
  if(!knightFreed){
    const at2=cfg2.allyType||'blue_knight';
    // Draw the correct prisoner character, feet at ground level
    const charH=62; // approx character height
    const cx=sx+sw/2-18;
    const cy=groundY-charH; // feet on ground

    if(at2==='villager'){
      // Villager — crouching/sad pose
      cEl(cx+19,cy+14,10,11,'#f5c890','#333',2);
      ctx.fillStyle='#8b4513'; ctx.beginPath(); ctx.ellipse(cx+19,cy+5,11,6,0,0,Math.PI*2); ctx.fill();
      cRR(cx+8,cy+22,22,24,5,'#c8a060','#333',2);
      cRR(cx+2,cy+24,7,16,3,'#a07840','#333',2); cRR(cx+27,cy+24,7,16,3,'#a07840','#333',2);
      cRR(cx+8,cy+44,10,18,3,'#6a4820','#333',2); cRR(cx+20,cy+44,10,18,3,'#6a4820','#333',2);
      // Sad face
      cEl(cx+14,cy+12,2,2,'#333'); cEl(cx+24,cy+12,2,2,'#333');
      ctx.strokeStyle='#555'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx+19,cy+20,4,0.3,Math.PI-0.3,true); ctx.stroke();
    } else if(at2==='elf_archer'){
      // Elf archer in cell
      cEl(cx+19,cy+10,9,10,'#e8c080','#333',2);
      ctx.fillStyle='#8b6010'; ctx.beginPath(); ctx.ellipse(cx+19,cy+3,9,7,0,0,Math.PI*2); ctx.fill();
      // Pointy ears
      ctx.fillStyle='#e8c080'; ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(cx+10,cy+8); ctx.lineTo(cx+5,cy+2); ctx.lineTo(cx+10,cy+14); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+28,cy+8); ctx.lineTo(cx+33,cy+2); ctx.lineTo(cx+28,cy+14); ctx.closePath(); ctx.fill(); ctx.stroke();
      cRR(cx+10,cy+18,18,24,5,'#2a7a30','#111',2);
      cRR(cx+4,cy+20,7,18,3,'#2a7a30','#111',2); cRR(cx+27,cy+20,7,18,3,'#2a7a30','#111',2);
      cRR(cx+10,cy+40,9,22,3,'#1a5a20','#111',2); cRR(cx+19,cy+40,9,22,3,'#1a5a20','#111',2);
      // Eyes
      cEl(cx+15,cy+9,2,2.5,'#2a7a30'); cEl(cx+23,cy+9,2,2.5,'#2a7a30');
    } else if(at2==='royal_father'){
      // King in red robes
      cEl(cx+19,cy+10,11,12,'#f0c090','#333',2);
      // Crown
      ctx.fillStyle='#ffe066'; ctx.strokeStyle='#cc8800'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(cx+9,cy+2); ctx.lineTo(cx+29,cy+2); ctx.lineTo(cx+29,cy+8);
      ctx.lineTo(cx+24,cy+4); ctx.lineTo(cx+19,cy+8); ctx.lineTo(cx+14,cy+4); ctx.lineTo(cx+9,cy+8); ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Grey beard
      ctx.fillStyle='#aaa'; ctx.beginPath(); ctx.moveTo(cx+11,cy+16); ctx.bezierCurveTo(cx+9,cy+28,cx+14,cy+32,cx+19,cy+30); ctx.bezierCurveTo(cx+24,cy+32,cx+29,cy+28,cx+27,cy+16); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#8b0000'; ctx.strokeStyle='#111'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(cx+4,cy+20); ctx.lineTo(cx+2,cy+62); ctx.lineTo(cx+36,cy+62); ctx.lineTo(cx+34,cy+20); ctx.closePath(); ctx.fill(); ctx.stroke();
      cEl(cx+14,cy+9,2,2.5,'#3a2060'); cEl(cx+24,cy+9,2,2.5,'#3a2060');
    } else {
      // blue_knight or green_knight — draw full knight with helmet
      drawKnight(cx, cy, false, 0, cfg2.knightColor||'blue', 0);
    }

    // "Help!" speech bubble (only shows when player is nearby)
    if(Math.abs(sx+sw/2-(p1?p1.x+p1.w/2:300))<260){
      ctx.fillStyle='rgba(255,255,255,0.94)';
      ctx.beginPath(); ctx.roundRect(sx+sw/2-30, sy-40, 64, 24, 8); ctx.fill();
      ctx.strokeStyle='#aaa'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(sx+sw/2-30, sy-40, 64, 24, 8); ctx.stroke();
      // Bubble tail
      ctx.fillStyle='rgba(255,255,255,0.94)';
      ctx.beginPath(); ctx.moveTo(sx+sw/2-6,sy-18); ctx.lineTo(sx+sw/2,sy-10); ctx.lineTo(sx+sw/2+6,sy-18); ctx.fill();
      ctx.fillStyle='#222'; ctx.font='bold 10px Nunito,sans-serif'; ctx.textAlign='center';
      ctx.fillText('Help! 😭', sx+sw/2+2, sy-24);
    }
  } else {
    // Freed — show broken bars + sparkle
    ctx.strokeStyle='#ff0'; ctx.lineWidth=3; ctx.lineCap='round';
    // Two bent bars
    ctx.beginPath(); ctx.moveTo(barX+4,barY+2); ctx.lineTo(barX+10,barY+20); ctx.lineTo(barX+6,barY+barH-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(barX+barW-4,barY+2); ctx.lineTo(barX+barW-10,barY+20); ctx.lineTo(barX+barW-6,barY+barH-2); ctx.stroke();
    ctx.fillStyle='rgba(255,220,50,0.9)'; ctx.font='bold 12px Cinzel,serif'; ctx.textAlign='center';
    ctx.fillText('🔓 FREE!', sx+sw/2, sy-14);
  }
}

function drawKnight(x,y, animate=false, f=0, color='blue', swordSwing=0){
  const cMain = KNIGHT_COLORS[color]||'#3b82f6';
  const cLight= KNIGHT_PLUME[color]||'#60a5fa';
  const cDark = KNIGHT_DARK[color]||'#1d4ed8';
  const swinging = swordSwing>0;
  const swingAng = swinging ? (1-(swordSwing/12))*Math.PI*0.9 : 0;

  // ── Sword ──
  ctx.save();
  ctx.translate(x+28, y+22);
  ctx.rotate(swinging ? -swingAng : -0.3);
  // Blade
  ctx.fillStyle='#b8b8c8'; ctx.beginPath();
  ctx.moveTo(-2,-30); ctx.lineTo(2,-30); ctx.lineTo(3,2); ctx.lineTo(-3,2); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#dde'; ctx.fillRect(-1,-29,1.5,28); // fuller shine
  ctx.strokeStyle='#777'; ctx.lineWidth=1; ctx.beginPath();
  ctx.moveTo(-2,-30); ctx.lineTo(2,-30); ctx.lineTo(3,2); ctx.lineTo(-3,2); ctx.closePath(); ctx.stroke();
  ctx.fillStyle='#ffe066'; // tip point
  ctx.beginPath();ctx.moveTo(-2,-29);ctx.lineTo(2,-29);ctx.lineTo(0,-34);ctx.fill();
  ctx.fillStyle='#8b6a20'; ctx.strokeStyle='#5a3a00'; ctx.lineWidth=1.5; // crossguard
  ctx.beginPath();ctx.roundRect(-7,-2,14,4,2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#7a5518'; ctx.strokeStyle='#4a2a00'; ctx.lineWidth=1; // grip
  ctx.beginPath();ctx.roundRect(-2,2,4,9,2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#aaa'; ctx.beginPath();ctx.arc(0,11,3,0,Math.PI*2);ctx.fill(); // pommel
  if(swinging){
    ctx.globalAlpha=0.3; ctx.fillStyle='#fff';
    ctx.beginPath();ctx.moveTo(-4,-34);ctx.lineTo(4,-34);ctx.lineTo(3,2);ctx.lineTo(-3,2);ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.restore();

  // ── Cape (behind body) ──
  ctx.fillStyle=cMain; ctx.strokeStyle=cDark; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(x+6,y+14);
  ctx.bezierCurveTo(x+2,y+24, x+0,y+40+(animate&&f>1?4:0), x+4,y+46+(animate&&f>1?6:0));
  ctx.lineTo(x+9,y+46+(animate&&f>1?5:0));
  ctx.bezierCurveTo(x+8,y+38, x+9,y+22, x+9,y+14);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Cape inner shadow
  ctx.fillStyle=cDark;
  ctx.beginPath();
  ctx.moveTo(x+7,y+16);
  ctx.bezierCurveTo(x+4,y+26,x+3,y+40,x+6,y+44+(animate&&f>1?4:0));
  ctx.lineTo(x+8,y+42+(animate&&f>1?4:0));
  ctx.bezierCurveTo(x+7,y+34,x+7,y+22,x+8,y+16);
  ctx.closePath(); ctx.fill();

  // ── Armour body ──
  // Torso plate
  ctx.fillStyle='#b0b0b8'; ctx.strokeStyle='#555'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(x+5,y+16,22,30,4); ctx.fill(); ctx.stroke();
  // Chest highlight
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.ellipse(x+16,y+24,7,9,0,0,Math.PI*2); ctx.fill();
  // Surcoat emblem (coloured diamond)
  ctx.fillStyle=cMain; ctx.strokeStyle=cDark; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(x+16,y+22); ctx.lineTo(x+21,y+27); ctx.lineTo(x+16,y+32); ctx.lineTo(x+11,y+27);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Belt
  ctx.fillStyle='#5a3a10'; ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x+5,y+43,22,5,2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#ffe066'; // buckle
  ctx.beginPath(); ctx.roundRect(x+13,y+42,6,6,1); ctx.fill();

  // Left arm
  ctx.fillStyle='#a8a8b0'; ctx.strokeStyle='#555'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x+0,y+18,7,20+(animate&&!swinging&&f>1?3:0),3); ctx.fill(); ctx.stroke();
  // Right arm — raised when swinging
  if(swinging){
    ctx.beginPath(); ctx.roundRect(x+22,y+14,8,14,3); ctx.fill(); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.roundRect(x+24,y+18,7,20+(animate&&f<2?3:0),3); ctx.fill(); ctx.stroke();
  }
  // Gauntlets
  ctx.fillStyle='#909098'; ctx.strokeStyle='#444'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.roundRect(x-1,y+36,8,7,3); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(x+24,y+36+(swinging?-20:0),7,7,3); ctx.fill(); ctx.stroke();

  // Legs
  ctx.fillStyle='#a0a0a8'; ctx.strokeStyle='#555'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x+6,y+47,10,animate?(f<2?20:15):20,3); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(x+17,y+47,10,animate?(f<2?15:20):20,3); ctx.fill(); ctx.stroke();
  // Sabatons (armoured feet)
  ctx.fillStyle='#888890'; ctx.strokeStyle='#444'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.roundRect(x+4,y+47+(animate?f<2?20:15:20),13,6,2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(x+16,y+47+(animate?f<2?15:20:20),13,6,2); ctx.fill(); ctx.stroke();

  // ── HELMET — proper great helm / bascinet style ──
  const hx=x+5, hy=y-4;
  const hw=22, hh=24;

  // Gorget (neck guard — overlaps body top)
  ctx.fillStyle='#a0a0a8'; ctx.strokeStyle='#444'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(x+6,y+13,20,7,2); ctx.fill(); ctx.stroke();

  // Skull (rounded dome)
  ctx.fillStyle='#b0b0b8'; ctx.strokeStyle='#444'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(hx,hy+hh);
  ctx.lineTo(hx,hy+10);
  ctx.bezierCurveTo(hx,hy+2, hx+3,hy, hx+hw/2,hy);
  ctx.bezierCurveTo(hx+hw-3,hy, hx+hw,hy+2, hx+hw,hy+10);
  ctx.lineTo(hx+hw,hy+hh);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Dome highlight
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath(); ctx.ellipse(hx+hw*0.38,hy+7,5,4,-.3,0,Math.PI*2); ctx.fill();

  // Visor face plate (flat lower half)
  ctx.fillStyle='#a8a8b2'; ctx.strokeStyle='#444'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(hx+1,hy+hh*0.38,hw-2,hh*0.62,3); ctx.fill(); ctx.stroke();

  // T-shaped visor opening
  // Horizontal eye slit
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.roundRect(hx+3,hy+hh*0.42,hw-6,4,2); ctx.fill();
  // Vertical nasal bar splits the slit
  ctx.fillStyle='#a8a8b2'; ctx.strokeStyle='#444'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(hx+hw/2-2,hy+hh*0.38,4,hh*0.62,1); ctx.fill(); ctx.stroke();
  // Breathing holes (lower half)
  ctx.fillStyle='#1a1a1a';
  for(let hi2=0;hi2<3;hi2++){
    ctx.beginPath(); ctx.ellipse(hx+6+hi2*4, hy+hh*0.74, 1.5, 1, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hx+hw-6-hi2*4, hy+hh*0.74, 1.5, 1, 0, 0, Math.PI*2); ctx.fill();
  }
  // Visor chin
  ctx.fillStyle='#b0b0b8'; ctx.strokeStyle='#555'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(hx+2,hy+hh-5,hw-4,6,3); ctx.fill(); ctx.stroke();

  // Rivets on visor edge
  ctx.fillStyle='#777';
  [[hx+4,hy+hh*0.38+2],[hx+hw-4,hy+hh*0.38+2]].forEach(([rx,ry])=>{
    ctx.beginPath();ctx.arc(rx,ry,2,0,Math.PI*2);ctx.fill();
  });

  // ── Plume (feathers out the back/top) ──
  ctx.save();
  ctx.translate(hx+hw*0.5, hy+2);
  // Plume base
  for(let p2=0;p2<6;p2++){
    const spread=(p2-(5/2))*0.22;
    const len=20+Math.abs(p2-2.5)*2;
    ctx.strokeStyle=p2<3?cMain:cLight;
    ctx.lineWidth=3-Math.abs(p2-2.5)*0.4;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.quadraticCurveTo(spread*len*0.8, -len*0.6, spread*len, -len);
    ctx.stroke();
  }
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();ctx.fill();
}

// ── DRAW ENEMIES ──────────────────────────────────────
function drawEnemies(){
  enemies.forEach(e=>{
    if(!e.alive) return;

    if(sx<-80||sx>W+80) return;

    const isAerial2=e.type==='fire_imp'||e.type==='ice_shard'||e.type==='winged_lady';

// ── DRAW PROJECTILES ──────────────────────────────────
function drawProjectiles(){
  projectiles.forEach(proj=>{
    if(!proj.alive) return;
    const sx=proj.x, sy=proj.y;
    if(proj.kind==='rainbow'){
      const rc=RAINBOW_COLS[proj.colorIdx];
      ctx.fillStyle=rc;ctx.fillRect(sx-proj.w/2,sy-proj.h/2,proj.w,proj.h);
      ctx.fillStyle='#fff8';ctx.fillRect(sx-proj.w/2+2,sy-2,proj.w-4,4);
      ctx.globalAlpha=0.38;ctx.fillStyle=RAINBOW_COLS[(proj.colorIdx+2)%7];
      ctx.fillRect(sx-proj.w/2-proj.vx*1.4,sy-3,proj.w*0.55,5);ctx.globalAlpha=1;
      proj.colorT++;if(proj.colorT>3){proj.colorT=0;proj.colorIdx=(proj.colorIdx+1)%7;}
    } else if(proj.kind==='beam'){
      // Rainbow charge beam — wide, glowing
      const pw=proj.w, ph=proj.h;
      // Glow layers
      const glow=proj.power;
      ctx.globalAlpha=0.25;
      ctx.fillStyle=RAINBOW_COLS[Math.floor(gFrame*0.4)%7];
      ctx.fillRect(sx-pw/2-8,sy-ph/2-8,pw+16,ph+16);
      ctx.globalAlpha=0.5;
      ctx.fillStyle=RAINBOW_COLS[Math.floor(gFrame*0.4+2)%7];
      ctx.fillRect(sx-pw/2-4,sy-ph/2-4,pw+8,ph+8);
      ctx.globalAlpha=1;
      // Core beam (rainbow stripes)
      for(let b=0;b<7;b++){
        ctx.fillStyle=RAINBOW_COLS[b];
        ctx.fillRect(sx-pw/2,sy-ph/2+b*(ph/7),pw,Math.ceil(ph/7)+1);
      }
      // White core shimmer
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.fillRect(sx-pw/2+2,sy-2,pw-4,4);
      // Sparkle on front edge
      for(let i=0;i<4;i++){
        const sy2=sy-ph/2+i*(ph/4)+2;
        ctx.fillStyle=RAINBOW_COLS[(proj.colorIdx+i)%7];
        ctx.beginPath();ctx.ellipse(sx+(proj.vx>0?pw/2:(-pw/2)),sy2,4,4,0,0,Math.PI*2);ctx.fill();
      }
      proj.colorT++;if(proj.colorT>2){proj.colorT=0;proj.colorIdx=(proj.colorIdx+1)%7;}
    } else if(proj.kind==='fireball'){
      ctx.fillStyle='#ff5500';ctx.beginPath();ctx.ellipse(sx,sy,proj.w/2,proj.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.ellipse(sx,sy,proj.w/4,proj.h/4,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.38;ctx.fillStyle='#ff3300';ctx.beginPath();ctx.ellipse(sx-proj.vx,sy,proj.w*0.58,proj.h*0.38,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    } else if(proj.kind==='efireball'){
      ctx.fillStyle='#ff2200';ctx.beginPath();ctx.ellipse(sx,sy,proj.w/2,proj.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff6600';ctx.beginPath();ctx.ellipse(sx,sy,proj.w/4,proj.h/4,0,0,Math.PI*2);ctx.fill();
    } else if(proj.kind==='arrow'){
      ctx.fillStyle='#8b7355';ctx.fillRect(sx-10,sy-2,22,4);
      ctx.fillStyle='#aaa';ctx.fillRect(sx+10,sy-4,8,8);
      ctx.fillStyle='#cc6633';ctx.fillRect(sx-12,sy-3,6,6);
    } else if(proj.kind==='knightArrow'){
      // Knight-fired arrow — gleaming silver with gold tip, angled along velocity
      const ang=Math.atan2(proj.vy,proj.vx);
      ctx.save();ctx.translate(sx,sy);ctx.rotate(ang);
      ctx.fillStyle='#c8c8d8';ctx.fillRect(-12,-2,24,4);
      ctx.fillStyle='#ffe066';ctx.fillRect(11,-3,6,6);
      ctx.fillStyle='#6a5a30';ctx.fillRect(-14,-3,6,6);
      ctx.restore();
    } else if(proj.kind==='javelin'){
      ctx.fillStyle='#8b7355';ctx.fillRect(sx-16,sy-3,36,6);
      ctx.fillStyle='#ccc';ctx.fillRect(sx+18,sy-5,8,10);
    } else if(proj.kind==='bossshot'){
      ctx.globalAlpha=0.22;cEl(sx,sy,proj.w+4,proj.h+4,'#aa0000');ctx.globalAlpha=1;
      cEl(sx,sy,proj.w/2,proj.h/2,'#cc2200','#111',2);cEl(sx,sy,proj.w/4,proj.h/4,'#ff6600');
    } else if(proj.kind==='rock'){
      ctx.fillStyle='#7a6a58';ctx.beginPath();ctx.ellipse(sx,sy,proj.w/2,proj.h/2,proj.t*0.05,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#9a8a78';ctx.beginPath();ctx.ellipse(sx-3,sy-3,proj.w/5,proj.h/5,0,0,Math.PI*2);ctx.fill();
    } else if(proj.kind==='iceshard'){
      ctx.fillStyle='#aaddff';ctx.strokeStyle='#3388cc';ctx.lineWidth=2;
      ctx.save();ctx.translate(sx,sy);ctx.rotate(proj.t*0.14);
      ctx.beginPath();ctx.moveTo(0,-proj.h);ctx.lineTo(proj.w/3,0);ctx.lineTo(0,proj.h);ctx.lineTo(-proj.w/3,0);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
    } else if(proj.kind==='lavaBlob'){
      ctx.fillStyle=`rgba(255,80,0,0.92)`;ctx.beginPath();ctx.ellipse(sx,sy,proj.w/2,proj.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(255,200,0,0.7)`;ctx.beginPath();ctx.ellipse(sx-2,sy-2,proj.w/4,proj.h/4,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.3;ctx.fillStyle='#ff4400';ctx.beginPath();ctx.ellipse(sx,sy,proj.w*0.8,proj.h*0.7,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }
  });
}

// ── DRAW PARTICLES ────────────────────────────────────
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/40);
    ctx.fillStyle=p.col;
    const s=Math.max(1,p.sz);
    ctx.fillRect(Math.floor(p.x-s/2),Math.floor(p.y-s/2),s,s);
  });
  ctx.globalAlpha=1;
}

// ── CHARGE UI ─────────────────────────────────────────
function drawChargeAura(){
  if(chargeBeam.level<15||!p1||p1.dead) return;
  const pct=chargeBeam.level/chargeBeam.maxLevel;
  const px=Math.floor(p1.x+p1.w/2), py=Math.floor(p1.y+20);
  ctx.globalAlpha=0.15+pct*0.35;
  ctx.fillStyle=RAINBOW_COLS[Math.floor(gFrame*0.35)%7];
  ctx.beginPath();ctx.ellipse(px,py,30+pct*40,25+pct*30,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  if(pct>=1){
    // "READY!" flash over unicorn
    if(Math.floor(gFrame/14)%2===0){
      ctx.fillStyle='#ffe066';ctx.font='bold 12px Cinzel,serif';ctx.textAlign='center';
      ctx.fillText('⚡ BEAM READY!',px,p1.y-20);
    }
  }
}

// ── PROGRESS BAR ─────────────────────────────────────
function drawProgressBar(){
  const barW=W-44, prog=Math.min(1,(worldX+(p1?p1.x:400))/levelWorldLen);
  ctx.fillStyle='rgba(0,0,0,0.38)';ctx.fillRect(22,H-15,barW,12);
  const pg=ctx.createLinearGradient(22,0,22+barW,0);
  pg.addColorStop(0,'#8b2be2');pg.addColorStop(1,'#f0abfc');
  ctx.fillStyle=pg;ctx.fillRect(22,H-15,Math.floor(barW*prog),12);
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='8px Nunito';ctx.textAlign='center';
  ctx.fillText(`⚔ ${LEVELS[curLevel-1].name}  ${Math.floor(prog*100)}%  🏰`,W/2,H-4);
}

// ── GAME FLOW ─────────────────────────────────────────
function nextLevel(){
  curLevel++;
  if(curLevel>5){showEndScreen(true);return;}
  allKnights=allKnights.filter(k=>k.persistent!==false);
  // Save knight state so retry restores them
  savedKnights=allKnights.map(k=>Object.assign({},k));
  generateLevel(curLevel);
  if(p1){resetPlayer(p1,100,GROUND-80);p1.hp=p1.maxHp;}
  if(p2){resetPlayer(p2,60,GROUND-80);p2.hp=p2.maxHp;}
  // Restore full lives each level
  lives1=LIVES_START; lives2=LIVES_START;
  updateHUD();
  showLevelScreen();
}

function showLevelScreen(){
  const cfg=LEVELS[curLevel-1];
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`
    <div class="level-banner">⚔️ Level ${curLevel}</div>
    <div class="level-name">${cfg.name}</div>
    <div class="charge-hint">${cfg.chargeTip}</div>
    <div class="level-tip">${cfg.tip}</div>
    <div class="btn-row"><button class="gBtn" onclick="resumeLevel()">Enter Level →</button></div>
  `;
  gState='paused';
}
function resumeLevel(){
  document.getElementById('overlay').style.display='none';
  gState='playing';

}

function startGame(np, startLv){
  numPlayers=np;
  gState='playing';
  const wasLevel=curLevel;
  curLevel=startLv||1;
  lives1=LIVES_START;lives2=LIVES_START;
  gFrame=0;
  // Retrying a level (same level, not fresh start from 1): restore saved knights
  if(curLevel>1&&curLevel===wasLevel&&savedKnights.length>0){
    allKnights=savedKnights.map(k=>Object.assign({},k));
  } else if(curLevel<=1){
    // Fresh game from level 1 — no knights yet
    allKnights=[];
    savedKnights=[];
    score1=0;score2=0;
  } else {
    // Jumping to a mid-level via menu — restore saved knights if any
    allKnights=savedKnights.length>0?savedKnights.map(k=>Object.assign({},k)):[];
    score1=0;score2=0;
  }

  p1=makeP1(100,GROUND-80);
  p2=np===2?makeP2(60,GROUND-80):null;

  document.getElementById('p2hudG').style.display=np===2?'flex':'none';
  document.getElementById('p2hpG').style.display=np===2?'flex':'none';

  generateLevel(curLevel);
  updateHUD();

  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  const cfg=LEVELS[curLevel-1];
  ov.innerHTML=`
    <div class="level-banner">⚔️ Level ${curLevel}</div>
    <div class="level-name">${cfg.name}</div>
    <div class="charge-hint">${cfg.chargeTip}</div>
    <div class="level-tip">${cfg.tip}</div>
    <div class="btn-row"><button class="gBtn" onclick="resumeLevel()">Begin Adventure →</button></div>
  `;
  gState='paused';
}

// ── MAIN LOOP ─────────────────────────────────────────
function gameLoop(){
  requestAnimationFrame(gameLoop);
  if(gState==='playing'){
    gFrame++;
    updateP1();
    if(p2) updateP2();
    updateEnemies();
    updateBoss();
    updateLavaHazards();
    updateKnight();
    updateProjectiles();
    updateParticles();
    Object.assign(prevKeys,keys);
    if(gFrame%8===0) updateHUD();
  }
  // Draw
  drawBG();
  drawWallsAndPlatforms();
  drawEnemies();
  drawProjectiles();
  drawParticles();
  drawChargeAura();
  if(p1&&!p1.dead) drawPrincess();
  if(p2&&!p2.dead) drawDragon();
  drawFreedKnight();
  drawBoss();
  drawProgressBar();
  // Dead messages
  if(p1&&p1.dead&&lives1>0){
    ctx.fillStyle='rgba(255,80,80,0.8)';ctx.font='bold 14px Nunito';ctx.textAlign='center';
    { const rem=lives1-1; ctx.fillText(`💀 Respawning… ${rem} ${rem===1?'life':'lives'} remaining`,W/2,H/2-16); }
  }
  if(bossDefeated&&!knightFreed){
    ctx.fillStyle='rgba(255,220,50,0.95)';ctx.font='bold 26px Cinzel,serif';ctx.textAlign='center';
    ctx.fillText('BOSS DEFEATED! 🏆',W/2,H/2-28);
  }
  if(knightFreed){
    const freedNames={
      blue_knight:'Sir Aldwyn the Knight',
      villager:'The Captive Villagers',
      elf_archer:'Sylara the Elf Archer',
      red_knight:'Sir Brennan the Red',
      green_knight:'Sir Roland the Green',
      royal_father:'King Aldric, Your Father',
    };
    const cfg3=LEVELS[curLevel-1];
    const freedName=freedNames[cfg3&&cfg3.allyType]||'Sir Knight';
    const isFinal=curLevel===5;
    ctx.fillStyle='rgba(255,248,100,0.95)';ctx.font='bold 20px Cinzel,serif';ctx.textAlign='center';
    ctx.fillText('🌟 '+freedName.toUpperCase()+' IS FREE! 🌟',W/2,H/2-18);
    ctx.fillStyle='rgba(255,200,50,0.8)';ctx.font='14px Nunito';
    ctx.fillText(isFinal?'The Kingdom is saved!':'Preparing next level…',W/2,H/2+14);
  }
}

showTitle();
gameLoop();
</script>
